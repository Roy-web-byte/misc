<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="shortcut icon" href="https://github.githubassets.com/favicon.ico" type="image/x-icon">
        <link rel="icon" href="https://github.githubassets.com/favicon.ico" type="image/x-icon">
        <title>English Reader - Pro Linking</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            }
            body {
                background: #f7f8fa;
                padding: 20px;
                max-width: 800px;
                margin: 0 auto;
                position: relative;
                padding-bottom: 20px;
            }
            .title {
                text-align: center;
                font-size: 32px;
                font-weight: bold;
                color: #2c3e50;
                margin: 30px 0 20px;
                cursor: pointer;
            }
            #voiceSelect {
                width: 100%;
                padding: 12px;
                font-size: 16px;
                border: 1px solid #ddd;
                border-radius: 12px;
                margin-bottom: 10px;
                background: #fff;
                outline: none;
            }
            #inputArea {
                width: 100%;
                height: 180px;
                padding: 15px;
                font-size: 17px;
                line-height: 1.5;
                border: 1px solid #ddd;
                border-radius: 12px;
                resize: vertical;
                outline: none;
                background: white;
                color: #333;
            }
            #inputArea::placeholder {
                color: #888;
                opacity: 1;
                font-size: 16px;
            }
            #goBtn {
                width: 100%;
                padding: 14px;
                font-size: 18px;
                font-weight: 600;
                background: #007aff;
                color: white;
                border: none;
                border-radius: 12px;
                margin: 12px 0 12px;
                cursor: pointer;
            }
            #wordCount {
                text-align: center;
                font-size: 16px;
                color: #666;
                margin-bottom: 10px;
                min-height: 24px;
            }
            #navHistory {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 25px;
                gap: 8px;
            }
            .history-arrows {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 20px;
            }
            .history-arrow {
                font-size: 24px;
                cursor: pointer;
                color: #007aff;
                user-select: none;
                transition: opacity 0.2s;
            }
            .history-arrow:hover { opacity: 0.8; }
            .history-arrow.disabled {
                color: #007aff;
                opacity: 0.5;
                cursor: not-allowed;
            }
            #historyTime {
                font-size: 13px;
                color: #888;
                text-align: center;
                min-height: 20px;
            }
            #result {
                line-height: 1.8;
                font-size: 22px;
                margin-bottom: 20px;
                padding-bottom: 120px;
            }
            .sentence {
                display: flex;
                align-items: center;
                padding: 14px 12px;
                border-radius: 10px;
                margin-bottom: 10px;
                background: #fff;
                border: 1px solid #eee;
                transition: background 0.2s;
                cursor: pointer;
                user-select: none;
            }
            .sentence.active {
                background: #e1f5fe;
                border-color: #007aff;
            }
            .speaker {
                margin-right: 12px;
                font-size: 24px;
                user-select: none;
                flex-shrink: 0;
            }
            .word {
                display: inline-block;
                padding: 2px 4px;
                border-radius: 4px;
                cursor: pointer;
                transition: background-color 0.2s;
            }
            .word.active {
                background: #ffeb3b;
                font-weight: 500;
            }
            /* 连读着色样式 - 采用 Update30 风格 */
            .link-phonetic {
                background-color: #e8e8e8; 
                border-radius: 6px;
                padding: 2px 2px;
                margin: 0 1px;
                touch-action: pan-y; /* 允许纵向滚动，但通过JS捕获横滑 */
            }
            /* 生词区样式 */
            #newWordsArea {
                margin-top: 30px;
                padding-top: 20px;
                padding-bottom: 100px;
                border-top: 2px solid #e0e0e0;
            }
            .new-words-title {
                font-size: 20px;
                font-weight: bold;
                color: #2c3e50;
                margin-bottom: 15px;
            }
            #newWordsList {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }
            .new-word-item {
                display: inline-flex;
                align-items: center;
                padding: 8px 12px;
                background-color: #f0f7ff;
                border: 1px solid #c2e0ff;
                border-radius: 20px;
                font-size: 22px;
                color: #0066cc;
                cursor: pointer;
                user-select: none;
            }
            /* 悬浮按钮 */
            #addWordBtn, #removeWordBtn {
                position: fixed;
                top: 100px;
                left: 50%;
                transform: translateX(-50%);
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background-color: #007aff;
                color: white;
                border: none;
                font-size: 28px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
                z-index: 1000;
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }
            #addWordBtn.show, #removeWordBtn.show {
                opacity: 1;
                visibility: visible;
            }
            .trash-btn {
                position: fixed;
                bottom: 30px;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: #007aff;
                color: white;
                border: none;
                font-size: 28px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
                transition: all 0.3s;
                opacity: 0;
                visibility: hidden;
                z-index: 99;
            }
            .trash-btn.show { opacity: 0.9; visibility: visible; }
            .trash-btn.pressed { background: #ff3b30; }
            #trashBtnLeft { left: 60px; }
            #trashBtnRight { right: 60px; }
            #backToTopBtn {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background-color: #007aff;
                color: white;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                border: none;
                font-size: 28px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
                z-index: 100;
                opacity: 0;
                visibility: hidden;
            }
            #backToTopBtn.show { opacity: 0.9; visibility: visible; }
        </style>
    </head>
    <body>
        <div class="title">English Reader</div>
        <select id="voiceSelect"></select>
        <textarea id="inputArea" placeholder="Paste your English text here..."></textarea>
        <button id="goBtn">Go</button>
        <div id="wordCount"></div>
        <div id="navHistory" style="display: none;">
            <div class="history-arrows">
                <span id="prevHistory" class="history-arrow">&#9664;&#xFE0E;</span>
                <span id="nextHistory" class="history-arrow">&#9654;&#xFE0E;</span>
            </div>
            <div id="historyTime"></div>
        </div>
        <div id="result"></div>
        <div id="newWordsArea" style="display: none;">
            <div class="new-words-title">📚 New Words</div>
            <div id="newWordsList"></div>
        </div>
        
        <button id="addWordBtn" title="Add to new words">+</button>
        <button id="removeWordBtn" title="Remove from new words">−</button>
        <button id="trashBtnLeft" class="trash-btn">🗑️</button>
        <button id="trashBtnRight" class="trash-btn">🗑️</button>
        <button id="backToTopBtn">↑</button>

<script>
    // ————————— 核心逻辑：Update30 连读规则算法 —————————
    const VOWELS = ['a', 'e', 'i', 'o', 'u'];
    const STOP_PUNCS = [',', '.', '!', '?', ';', ':', '"', '(', ')'];
    const PLOSIVES = ['p', 'b', 't', 'd', 'k', 'g'];
    const FRICATIVES = ['f', 'v', 's', 'z', 'h', 'l', 'm', 'n', 'r', 'w', 'j'];

    const clean = (w) => w.replace(/[^a-zA-Z]/g, '').toLowerCase();

    const getEndingSound = (word) => {
        const w = clean(word);
        if (!w) return '';
        if (w.length > 2 && w.endsWith('e')) {
            const beforeE = w[w.length - 2];
            if (['the', 'he', 'she', 'me', 'we', 'be'].includes(w)) return 'vowel';
            if (VOWELS.includes(beforeE)) return 'vowel';
            return beforeE;
        }
        if (w.endsWith('y')) return 'vowel';
        if (VOWELS.includes(w[w.length - 1])) return 'vowel';
        return w[w.length - 1];
    };

    const getStartingSound = (word) => {
        const w = clean(word);
        if (!w) return '';
        const silentH = ['hour', 'hours', 'honest', 'honestly', 'honor', 'honour', 'he', 'him', 'his', 'her'];
        if (silentH.includes(w)) return 'vowel';
        if (w.startsWith('u')) {
            const uniPrefixes = ['uni', 'use', 'usu', 'unit', 'unique'];
            if (uniPrefixes.some(p => w.startsWith(p))) return 'y';
            return 'vowel';
        }
        if (VOWELS.includes(w[0])) return 'vowel';
        return w[0];
    };

    const isVowelSound = (s) => s === 'vowel';

    const checkLinking = (w1, w2) => {
        const lastChar = w1[w1.length - 1];
        if (STOP_PUNCS.includes(lastChar)) return false;
        const s1 = getEndingSound(w1);
        const s2 = getStartingSound(w2);
        if (!s1 || !s2) return false;
        if (!isVowelSound(s1) && isVowelSound(s2)) return true;
        if (isVowelSound(s1) && isVowelSound(s2)) return true;
        if (!isVowelSound(s1) && s1 === s2) return true;
        if (PLOSIVES.includes(s1) && (PLOSIVES.includes(s2) || FRICATIVES.includes(s2))) return true;
        if (['t', 'd', 's', 'z'].includes(s1) && (clean(w2).startsWith('y') || clean(w2).startsWith('you'))) return true;
        return false;
    };

    const getGroups = (sentence) => {
        const words = sentence.split(/\s+/).filter(Boolean);
        const groups = [];
        let i = 0;
        while (i < words.length) {
            let currentGroup = [words[i]];
            while (i + 1 < words.length && checkLinking(words[i], words[i+1])) {
                currentGroup.push(words[i+1]);
                i++;
            }
            groups.push({ words: currentGroup, isLinked: currentGroup.length > 1 });
            i++;
        }
        return groups;
    };

    // ————————— Update29 核心应用功能 —————————
    const inputArea = document.getElementById('inputArea');
    const goBtn = document.getElementById('goBtn');
    const result = document.getElementById('result');
    const voiceSelect = document.getElementById('voiceSelect');
    const wordCountEl = document.getElementById('wordCount');
    const navHistoryEl = document.getElementById('navHistory');
    const prevHistoryBtn = document.getElementById('prevHistory');
    const nextHistoryBtn = document.getElementById('nextHistory');
    const historyTimeEl = document.getElementById('historyTime');
    const backToTopBtn = document.getElementById('backToTopBtn');
    const trashBtnLeft = document.getElementById('trashBtnLeft');
    const trashBtnRight = document.getElementById('trashBtnRight');
    const newWordsArea = document.getElementById('newWordsArea');
    const newWordsList = document.getElementById('newWordsList');
    const addWordBtn = document.getElementById('addWordBtn');
    const removeWordBtn = document.getElementById('removeWordBtn');

    let historyList = JSON.parse(localStorage.getItem('englishReaderHistory') || '[]');
    let historyIndex = parseInt(localStorage.getItem('englishReaderCurrentIndex') || '-1');
    let currentSelectedWord = '';
    let allVoices = [];
    
    // 用于滑动朗读的变量
    let lastSwipedElement = null;
    let touchStartX = 0;
    let touchStartY = 0;

    // 屏幕常亮
    let wakeLock = null;
    async function requestWakeLock() {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }
    document.addEventListener('visibilitychange', () => { if (wakeLock && document.visibilityState === 'visible') requestWakeLock(); });

    function save() {
        localStorage.setItem('englishReaderHistory', JSON.stringify(historyList));
        localStorage.setItem('englishReaderCurrentIndex', historyIndex);
    }

    function processText(text, isNew = true, savedData = null) {
        if (!text) return;
        const sentences = splitSentences(text);
        const totalWords = text.split(/\s+/).filter(Boolean).length;
        const data = savedData || sentences.map(s => getGroups(s));
        
        render(sentences, data);
        wordCountEl.textContent = `Total Words: ${totalWords}`;

        if (isNew) {
            const record = { text, timestamp: Date.now(), newWords: [], data };
            historyList.push(record);
            if (historyList.length > 20) historyList.shift();
            historyIndex = historyList.length - 1;
            save();
        }
        updateHistoryNav();
        updateNewWords();
        result.scrollIntoView({ behavior: 'smooth' });
    }

    function render(sentences, data) {
        result.innerHTML = '';
        sentences.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = 'sentence';
            div.innerHTML = `<div class="speaker">🔊</div><div class="words-container" style="width:100%"></div>`;
            const container = div.querySelector('.words-container');
            const groups = data[idx] || [];

            groups.forEach(g => {
                if (g.isLinked) {
                    const span = document.createElement('span');
                    span.className = 'link-phonetic';
                    g.words.forEach((w, wIdx) => {
                        span.appendChild(createWordSpan(w));
                        if (wIdx < g.words.length - 1) span.appendChild(document.createTextNode(' '));
                    });
                    container.appendChild(span);
                } else {
                    container.appendChild(createWordSpan(g.words[0]));
                }
                container.appendChild(document.createTextNode(' '));
            });
            div.onclick = (e) => { if (!e.target.classList.contains('word')) speak(s, div); };
            result.appendChild(div);
        });
    }

    function createWordSpan(text) {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = text;
        span.onclick = (e) => { e.stopPropagation(); speak(text, span); };
        return span;
    }

    function splitSentences(text) {
        return text.replace(/(\d):(\d)/g, '$1⏱$2')
                   .split(/(?<=[.!?])\s+/)
                   .map(s => s.replace(/⏱/g, ':').trim())
                   .filter(Boolean);
    }

    function speak(text, el) {
        window.speechSynthesis.cancel();
        document.querySelectorAll('.sentence, .word, .new-word-item, .link-phonetic').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        const u = new SpeechSynthesisUtterance(text);
        u.voice = allVoices[voiceSelect.value] || allVoices[0];
        u.rate = 0.95;
        u.onend = () => el.classList.remove('active');
        window.speechSynthesis.speak(u);
    }

    function loadVoices() {
        allVoices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = allVoices.map((v, i) => 
            v.lang.includes('en') ? `<option value="${i}">${v.name}</option>` : ''
        ).join('');
        const pref = allVoices.findIndex(v => v.name.includes('Daniel') || v.name.includes('Samantha'));
        if (pref !== -1) voiceSelect.value = pref;
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;

    goBtn.onclick = () => { processText(inputArea.value.trim()); inputArea.value = ''; };

    // 历史导航
    function updateHistoryNav() {
        navHistoryEl.style.display = historyList.length > 1 ? 'flex' : 'none';
        prevHistoryBtn.classList.toggle('disabled', historyIndex <= 0);
        nextHistoryBtn.classList.toggle('disabled', historyIndex >= historyList.length - 1);
        if (historyIndex >= 0) historyTimeEl.textContent = new Date(historyList[historyIndex].timestamp).toLocaleString();
    }

    prevHistoryBtn.onclick = () => {
        if (historyIndex > 0) {
            historyIndex--;
            const r = historyList[historyIndex];
            processText(r.text, false, r.data);
            save();
        }
    };
    nextHistoryBtn.onclick = () => {
        if (historyIndex < historyList.length - 1) {
            historyIndex++;
            const r = historyList[historyIndex];
            processText(r.text, false, r.data);
            save();
        }
    };

    // 生词本逻辑
    document.addEventListener('selectionchange', () => {
        const s = window.getSelection().toString().trim();
        if (s && (result.contains(window.getSelection().anchorNode) || newWordsArea.contains(window.getSelection().anchorNode))) {
            currentSelectedWord = s;
            const isExist = historyIndex >= 0 && historyList[historyIndex].newWords?.includes(s);
            if (isExist) {
                removeWordBtn.classList.add('show');
                addWordBtn.classList.remove('show');
            } else {
                addWordBtn.classList.add('show');
                removeWordBtn.classList.remove('show');
            }
        } else {
            addWordBtn.classList.remove('show');
            removeWordBtn.classList.remove('show');
        }
    });

    addWordBtn.onclick = () => {
        if (historyIndex >= 0 && currentSelectedWord) {
            const r = historyList[historyIndex];
            if (!r.newWords) r.newWords = [];
            if (!r.newWords.includes(currentSelectedWord)) {
                r.newWords.push(currentSelectedWord);
                save();
                updateNewWords();
            }
            addWordBtn.classList.remove('show');
        }
    };

    removeWordBtn.onclick = () => {
        if (historyIndex >= 0 && currentSelectedWord) {
            const r = historyList[historyIndex];
            r.newWords = r.newWords.filter(w => w !== currentSelectedWord);
            save();
            updateNewWords();
            removeWordBtn.classList.remove('show');
        }
    };

    function updateNewWords() {
        if (historyIndex < 0) return;
        const words = historyList[historyIndex].newWords || [];
        newWordsArea.style.display = words.length > 0 ? 'block' : 'none';
        newWordsList.innerHTML = words.map(w => `<div class="new-word-item">${w}</div>`).join('');
        newWordsList.querySelectorAll('.new-word-item').forEach(el => {
            el.onclick = () => speak(el.textContent, el);
        });
    }

    // 垃圾桶双击删除逻辑 (Update29 标志性功能)
    let lP = false, rP = false;
    const checkDel = () => {
        if (lP && rP) {
            historyList.splice(historyIndex, 1);
            historyIndex = historyList.length - 1;
            save();
            location.reload();
        }
    };
    trashBtnLeft.ontouchstart = (e) => { e.preventDefault(); lP = true; trashBtnLeft.classList.add('pressed'); checkDel(); };
    trashBtnRight.ontouchstart = (e) => { e.preventDefault(); rP = true; trashBtnRight.classList.add('pressed'); checkDel(); };
    trashBtnLeft.onmousedown = () => { lP = true; trashBtnLeft.classList.add('pressed'); checkDel(); };
    trashBtnRight.onmousedown = () => { rP = true; trashBtnRight.classList.add('pressed'); checkDel(); };
    
    const clearLP = () => { lP = false; trashBtnLeft.classList.remove('pressed'); };
    const clearRP = () => { rP = false; trashBtnRight.classList.remove('pressed'); };
    trashBtnLeft.onmouseup = trashBtnLeft.onmouseleave = trashBtnLeft.ontouchend = clearLP;
    trashBtnRight.onmouseup = trashBtnRight.onmouseleave = trashBtnRight.ontouchend = clearRP;

    // 滚动监听
    window.onscroll = () => {
        const show = window.scrollY > 300;
        backToTopBtn.classList.toggle('show', show);
        const atBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 80;
        trashBtnLeft.classList.toggle('show', atBottom);
        trashBtnRight.classList.toggle('show', atBottom);
    };
    backToTopBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

    // 全文朗读
    document.querySelector('.title').onclick = () => {
        const text = Array.from(document.querySelectorAll('.sentence .words-container')).map(c => c.textContent).join(' ');
        if (text) speak(text, document.querySelector('.title'));
    };

    // ————————— 新增/修改功能：滑动着色词组朗读 (仅限横向滑动) —————————
    result.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        lastSwipedElement = null; // 每次触摸开始，重置最后朗读的元素
    }, { passive: true });

    result.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const currentX = touch.clientX;
        const currentY = touch.clientY;

        // 计算偏移量
        const deltaX = Math.abs(currentX - touchStartX);
        const deltaY = Math.abs(currentY - touchStartY);

        // 核心判断：只有水平偏移明显大于垂直偏移时，才判定为“横向滑动朗读”
        // 这里的 1.5 是灵敏度比率，deltaX > deltaY 且 deltaX 超过 10px 启动
        if (deltaX > deltaY && deltaX > 10) {
            const target = document.elementFromPoint(currentX, currentY);
            if (!target) return;

            const linkedGroup = target.closest('.link-phonetic');

            if (linkedGroup) {
                if (linkedGroup !== lastSwipedElement) {
                    lastSwipedElement = linkedGroup;
                    speak(linkedGroup.textContent, linkedGroup);
                }
            }
        }
    }, { passive: true });

    result.addEventListener('touchend', () => {
        lastSwipedElement = null;
    });

    window.onload = () => {
        loadVoices();
        requestWakeLock();
        if (historyIndex >= 0 && historyList[historyIndex]) {
            const r = historyList[historyIndex];
            processText(r.text, false, r.data);
        }
    };
</script>
</body>
</html>
