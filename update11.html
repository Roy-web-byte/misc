<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>English Reader</title>
<style>
  :root{
    --bg:#f2f4f7;
    --card:#ffffff;
    --accent:#1a56db; /* blue for IPA */
    --muted:#6b7280;
    --btn:#007aff;
    --orange-loop:#ffdba6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  html,body{height:100%;margin:0;background:var(--bg);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  .container{max-width:900px;margin:28px auto;padding:16px;}
  .card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 6px 18px rgba(20,20,40,0.06);}
  header{display:flex;align-items:center;gap:12px;}
  h1{
    margin:0;font-size:20px;cursor:pointer;user-select:none;
    display:flex;align-items:center;gap:8px;color:#111827;
  }
  .title-sub{font-size:12px;color:var(--muted);margin-left:2px;}
  .controls{display:flex;gap:8px;margin-top:14px;align-items:center;}
  textarea{width:100%;min-height:120px;padding:12px;border-radius:10px;border:1px solid #e6e9ef;font-size:15px;resize:vertical}
  .btn{
    background:linear-gradient(180deg,#fff,#f3f7ff);border:1px solid rgba(0,0,0,0.06);
    padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:600;
    box-shadow:0 2px 6px rgba(20,20,60,0.04);
  }
  .go{background:#fff;border:1px solid rgba(0,0,0,0.06);}
  .speaker{display:inline-flex;align-items:center;gap:8px;padding:8px;border-radius:10px;}
  .meta{margin-top:12px;color:var(--muted);font-size:13px}
  .output{margin-top:16px}
  .sentence{
    display:block;
    background: #fcfcfd;
    border-radius:10px;padding:12px;margin-bottom:10px;
    transition:background .18s, box-shadow .18s; position:relative;
    border:1px solid rgba(10,10,20,0.03);
  }
  .sentence.highlight{box-shadow:0 6px 20px rgba(26,86,219,0.12);background: #f6f8ff;}
  .sentence.loop{background:var(--orange-loop);}
  .sentence .row{display:flex;align-items:flex-start;gap:10px;}
  .speaker-btn{
    width:36px;height:36px;border-radius:8px;display:inline-grid;place-items:center;
    cursor:pointer;border:1px solid rgba(0,0,0,0.06);background:linear-gradient(#fff,#f6f9ff);
  }
  .words{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
  .word{
    display:inline-flex;flex-direction:column;align-items:center;min-width:22px;padding:6px 8px;border-radius:8px;cursor:pointer;
    user-select:none;
  }
  .word .text{font-size:16px;color:#0b1220;}
  .ipa{font-size:14px;color:var(--accent);line-height:1.15;margin-top:4px;min-height:18px}
  .word.highlight .text{background:linear-gradient(90deg, rgba(26,86,219,0.08), rgba(26,86,219,0.02));padding:3px 6px;border-radius:6px}
  footer{font-size:12px;color:var(--muted);margin-top:14px;display:flex;justify-content:space-between;align-items:center}
  .small{font-size:12px;color:var(--muted)}
  .config{display:flex;gap:8px;align-items:center}
  input[type="text"]{padding:8px;border-radius:8px;border:1px solid #e6e9ef}
  @media (max-width:520px){
    .words{gap:6px}
    .word{padding:6px 6px}
  }
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <header>
        <h1 id="title" title="Click to read whole text">🔊 English Reader <span class="title-sub">— click title to read all</span></h1>
      </header>

      <div style="margin-top:12px">
        <textarea id="input" placeholder="Paste or type English text here..."></textarea>
        <div class="controls">
          <button class="btn go" id="goBtn">Go</button>
          <label class="speaker" title="Use external TTS (optional)">
            <input id="externalTTS" type="text" placeholder="External TTS endpoint (optional)" style="min-width:260px;padding:8px;border-radius:8px;border:1px solid #e6e9ef">
          </label>
          <button class="btn" id="clearBtn">Clear</button>
        </div>
        <div class="meta">Features: per-word IPA (fetched & cached), click word to play, click sentence to play, double-click to loop sentence, wake-lock kept while playing.</div>
      </div>

      <div class="output" id="output"></div>

      <footer>
        <div class="small">IPA color: <span style="color:var(--accent);font-weight:600">#1a56db</span> · IPA source: <span id="ipaSource">dictionaryapi.dev (client-side)</span></div>
        <div class="config"><button class="btn" id="releaseWake">Release Wake Lock</button></div>
      </footer>
    </div>
  </div>

<script>
/*
  English Reader
  - Single-file HTML/JS
  - Core requirement: precise sentence splitting:
    * Only split at sentence-final punctuation: . ? ! and Chinese 。 ？ ！
    * Do NOT split at commas, colons, semicolons, or Chinese 、 etc.
    * Handle common abbreviations (Mr., Dr., U.S.A., e.g., i.e., etc.) and initials.
  Implementation approach:
    - Use a candidate regex named splitSymbols to locate potential sentence terminators:
        const splitSymbols = /([.!?。？！])(?=(?:['")\]]*\s|$))/g;
      This finds punctuation characters that are followed by optional closing quotes/brackets then whitespace or end-of-string.
    - For each candidate, we perform additional checks to avoid splitting within abbreviations or initials:
        * check token before dot against an abbreviation set
        * detect multi-letter dotted acronyms like U.S.A. via regex (?:[A-Za-z]\.){2,}
        * detect initials sequences like "J. K." by looking ahead for another single-letter+dot token
*/

const inputEl = document.getElementById('input');
const goBtn = document.getElementById('goBtn');
const output = document.getElementById('output');
const title = document.getElementById('title');
const externalTTSInput = document.getElementById('externalTTS');
const ipaSourceLabel = document.getElementById('ipaSource');
const releaseWakeBtn = document.getElementById('releaseWake');
const clearBtn = document.getElementById('clearBtn');

/* splitSymbols must be present and strictly shaped as requested (only sentence-final punctuation) */
const splitSymbols = /([.!?。？！])(?=(?:['")\]]*\s|$))/g;

/* A set of common abbreviations (lowercase, without final dot) to avoid splitting after them.
   This is not exhaustive but includes many frequent forms. We also treat single-letter initial sequences
   and multi-letter dotted acronyms specially.
*/
const abbrSet = new Set([
  'mr','mrs','ms','dr','prof','sr','jr','st','rev','fr','ph.d','phd','d.c','md','inc','ltd','co','bros','gov','sen',
  'rep','supt','misc','dept','misc','fig','e.g','i.e','etc','esp','approx','assn','mgr','sec','dept','bros','corp','univ','est',
  'u.s','u.k','u.s.a','r.s','no'
].map(s => s.replace(/\.$/,'').toLowerCase()));

/* cache for IPA lookups: word -> ipa string */
const ipaCache = new Map();

/* speech synthesis voice selection */
let selectedVoice = null;
let voices = [];

/* wake lock sentinel */
let wakeLock = null;

/* active looping sentence index */
let loopingSentenceId = null;

/* Utility: check if a string contains any CJK character (Chinese etc.) */
function hasCJK(s){ return /[\u4E00-\u9FFF]/.test(s); }

/* Utility: normalize token for dictionary lookups:
   - strip surrounding punctuation except internal apostrophes and hyphens
   - convert U.S.A. -> USA (remove dots) for lookup
*/
function normalizeTokenForLookup(token){
  // Keep apostrophes and hyphens, remove leading/trailing punctuation like ( , ) . ? !
  let t = token.trim();
  // If token contains letters/dots and many dots (acronym), remove dots
  if(/^(?:[A-Za-z]\.){2,}$/.test(t.replace(/\s+/g,''))) {
    return t.replace(/\./g,'').replace(/[^A-Za-z]/g,'');
  }
  // Remove leading/trailing punctuation but preserve inner apostrophe and hyphen and colon for times
  // For times like 10:30, we'll convert specially later.
  t = t.replace(/^[\(\["'`]+/,'').replace(/[\)\]"',;:.!?]+$/,'');
  return t;
}

/* Number to words (simple, English, handles 0..9999 for our basic needs) */
function numberToWords(n){
  n = parseInt(n,10);
  if(isNaN(n)) return String(n);
  const ones=['zero','one','two','three','four','five','six','seven','eight','nine','ten',
    'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
  const tens=['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
  if(n<20) return ones[n];
  if(n<100){
    const t = Math.floor(n/10);
    const r = n%10;
    return tens[t] + (r?(' '+ones[r]):'');
  }
  if(n<1000){
    const h = Math.floor(n/100);
    const r = n%100;
    return ones[h] + ' hundred' + (r?(' '+numberToWords(r)):'');
  }
  if(n<1000000){
    const th = Math.floor(n/1000);
    const r = n%1000;
    return numberToWords(th) + ' thousand' + (r?(' '+numberToWords(r)):'');
  }
  return String(n);
}

/* Time like 10:30 -> "ten thirty" ; 10:05 -> "ten oh five" */
function timeToWords(tok){
  const m = tok.match(/^(\d{1,2}):(\d{1,2})$/);
  if(!m) return tok;
  let h = parseInt(m[1],10), mm = parseInt(m[2],10);
  let hh = numberToWords(h);
  let mmw = mm<10 ? ('oh '+numberToWords(mm)) : numberToWords(mm);
  return hh + ' ' + mmw;
}

/* Fetch IPA for a single word using dictionaryapi.dev (free public API).
   Returns IPA string like "/ˈwɜːd/" or empty string if not found.
   Caches using ipaCache Map to avoid repeat network calls.
*/
async function fetchIPAForWord(rawToken){
  if(!rawToken || hasCJK(rawToken)) return '';
  const key = rawToken.toLowerCase();
  if(ipaCache.has(key)) return ipaCache.get(key);

  let token = normalizeTokenForLookup(rawToken);

  // numeric/time handling
  if(/^\d+:\d+$/.test(token)) {
    token = timeToWords(token);
  } else if(/^\d+$/.test(token)) {
    token = numberToWords(token);
  }

  // If token still contains digits mixed with letters, try to strip punctuation
  token = token.replace(/^['"]+|['"]+$/g,''); // trim stray quotes

  // Try possible forms: 1) original, 2) lowercase, 3) strip dots (for acronyms)
  const candidates = [];
  if(token) {
    candidates.push(token);
    candidates.push(token.toLowerCase());
    if(token.includes('.')) candidates.push(token.replace(/\./g,''));
    if(/[A-Z]/.test(token)) candidates.push(token.toUpperCase());
  }

  let ipa = '';
  for(const cand of candidates){
    try{
      // dictionaryapi.dev endpoint
      const url = 'https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(cand);
      const res = await fetch(url);
      if(!res.ok) continue;
      const data = await res.json();
      if(Array.isArray(data) && data.length){
        // extract phonetics that look like IPA (contain IPA characters like ɪ ʊ ə ʒ ɜ etc or slashes)
        let phon = '';
        // many entries include phonetics[].text fields — choose the first non-empty text
        for(const entry of data){
          if(entry.phonetics && entry.phonetics.length){
            for(const ph of entry.phonetics){
              if(ph && ph.text){
                phon = ph.text;
                if(phon && phon.length>0) break;
              }
            }
          }
          if(phon) break;
          // some entries include "meanings" with "pronunciation" — rarely
        }
        if(phon){
          ipa = phon; // band's done
          break;
        } else {
          // If no .text, some APIs include 'phonetic' property
          for(const entry of data){
            if(entry.phonetic){
              ipa = entry.phonetic; break;
            }
          }
          if(ipa) break;
        }
      }
    }catch(err){
      // ignore fetch errors and continue
      // console.warn('IPA fetch error', err);
    }
  }

  if(!ipa){
    // Last resort: create a placeholder using letters with slashes to indicate missing ipa
    ipa = '—';
  }

  ipaCache.set(key, ipa);
  return ipa;
}

/* Determine whether a candidate punctuation at index idx (in original text) is a real sentence boundary.
   Uses:
    - splitSymbols to find punctuation positions (we will iterate matches)
    - additional checks:
       * if punctuation is '.' then ensure it's not part of common abbreviation (abbrSet)
       * if punctuation is part of dotted acronym like U.S.A. (pattern (?:[A-Za-z]\.){2,}) -> not boundary
       * if punctuation is a dot after a single letter and followed by another single-letter+dot after whitespace (initials) -> not boundary
*/
function isRealSentenceBoundary(fullText, matchIndex, matchChar){
  // matchIndex is index of punctuation char in fullText
  if(!fullText || matchIndex<0) return false;

  const ch = matchChar;
  // Chinese punctuation and ! and ? almost always end sentences
  if(ch === '。' || ch === '？' || ch === '！' || ch === '!' || ch === '?') return true;

  // For '.' we must be careful
  if(ch === '.'){
    // look backwards to get token immediately before the dot (letters, maybe with dots internally)
    const left = fullText.slice(0, matchIndex);
    // get last token (sequence of non-whitespace after last whitespace)
    const tokenMatch = left.match(/([A-Za-z\.]+)$/);
    const token = tokenMatch ? tokenMatch[1] : '';
    if(token){
      const low = token.toLowerCase().replace(/\.+$/,'');
      if(abbrSet.has(low)) return false; // common abbreviation; don't split
      // multi-letter dotted acronyms: e.g. U.S.A. -> token may be 'U.S.A'
      if(/^(?:[A-Za-z]\.){2,}[A-Za-z]?$/.test(token + '.')) return false;
      // e.g., "e.g." or "i.e." often matched by abbrSet earlier
      
      // If token is a single letter (initial), we need to see if it's part of an initials sequence like "J. K. Rowling"
      if(/^[A-Za-z]$/.test(token)){
        // look ahead after dot: skip spaces, check if next token is single-letter followed by dot -> if so, it's initials not end
        const after = fullText.slice(matchIndex+1);
        const m = after.match(/^\s*([A-Za-z])\./);
        if(m) return false;
      }
      // If token contains digits only (like "3.14") -> don't split
      if(/^\d+$/.test(token)) return false;
      if(/^\d+\.\d+$/.test( left.slice(left.length - (token.length+1)) )) return false;
    }
    // also check next char: if next char is lowercase letter, many sentence boundaries start with uppercase, but it's not reliable.
    return true; // default: treat as sentence end
  }
  return true;
}

/* Precise sentence splitter using splitSymbols as initial filter and additional checks.
   Returns array of sentences (trimmed).
*/
function splitIntoSentences(text){
  if(!text) return [];
  // Normalize whitespace
  let s = text.replace(/\r\n/g,'\n').replace(/\n+/g,' ').replace(/\t+/g,' ').trim();
  if(!s) return [];
  const sentences = [];
  let lastIndex = 0;
  // Iterate matches of splitSymbols
  let match;
  while((match = splitSymbols.exec(s)) !== null){
    const punctIndex = match.index; // index of punctuation char
    const punctChar = match[1];
    // check if this punctuation is a real sentence boundary
    if(isRealSentenceBoundary(s, punctIndex, punctChar)){
      // The sentence end is the punctIndex + 1, but there might be trailing quotes/brackets which belong to sentence.
      // consume any closing quotes or brackets immediately after punctuation
      let endPos = punctIndex + 1;
      while(endPos < s.length && /['")\]\u2019\u201D]/.test(s[endPos])) endPos++;
      const sentence = s.slice(lastIndex, endPos).trim();
      if(sentence) sentences.push(sentence);
      lastIndex = endPos;
    }
  }
  // remainder
  const remainder = s.slice(lastIndex).trim();
  if(remainder) sentences.push(remainder);
  return sentences;
}

/* Tokenize a sentence into words for display:
   - Splits on spaces but keeps punctuation attached (we'll display token as-is).
   - Word tokens containing any CJK char are left as-is (no IPA).
*/
function tokenizeSentence(sentence){
  // Simple split on spaces while preserving internal punctuation (hyphen/apostrophe kept)
  // Also keep tokens like "10:30" intact
  const rawTokens = sentence.split(/\s+/).filter(Boolean);
  return rawTokens;
}

/* Highlight helpers */
function clearAllHighlights(){
  document.querySelectorAll('.word.highlight').forEach(n=>n.classList.remove('highlight'));
  document.querySelectorAll('.sentence.highlight').forEach(n=>n.classList.remove('highlight'));
}

/* Speech synth helpers */
function populateVoices(){
  voices = speechSynthesis.getVoices();
  // prefer Samantha
  selectedVoice = voices.find(v => v.name && v.name.toLowerCase().includes('samantha')) ||
                  voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en-gb')) ||
                  voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en')) ||
                  voices[0] || null;
}
populateVoices();
if(typeof speechSynthesis !== 'undefined'){
  speechSynthesis.onvoiceschanged = populateVoices;
}

/* Play text with Web Speech API (or optional external TTS if provided).
   Returns a Promise that resolves when playback ends.
*/
function speakText(text, options={rate:1,pitch:1,lang:'en-US',external:false,externalUrl:''}){
  // If user provided an external TTS endpoint, attempt it (basic logic: POST {text} and expect audio blob)
  const extUrl = externalTTSInput.value.trim() || options.externalUrl;
  if(extUrl){
    // Try to fetch audio as a fallback; external endpoints are user-supplied; we attempt to POST text and handle audio response (Blob).
    // NOTE: Many endpoints require API keys and specific formats; this is best-effort and may fail due to CORS or auth.
    try{
      return fetch(extUrl, {
        method:'POST',
        mode:'cors',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({text})
      })
      .then(r=>{
        if(!r.ok) throw new Error('External TTS failed');
        return r.arrayBuffer();
      })
      .then(buf => {
        const blob = new Blob([buf], {type: 'audio/mpeg'});
        const url = URL.createObjectURL(blob);
        return playAudioUrl(url).finally(()=> URL.revokeObjectURL(url));
      })
      .catch(err=>{
        // fallback to speechSynthesis below
        // console.warn('External TTS failed:', err);
        return synthSpeak(text, options);
      });
    }catch(e){
      return synthSpeak(text, options);
    }
  } else {
    return synthSpeak(text, options);
  }
}

function playAudioUrl(url){
  return new Promise((resolve, reject)=>{
    const a = new Audio();
    a.src = url;
    a.onended = ()=> resolve();
    a.onerror = (e)=> reject(e);
    a.play().catch(reject);
  });
}

function synthSpeak(text, {rate=1,pitch=1,lang='en-US'} = {}){
  return new Promise((resolve, reject)=>{
    if(!('speechSynthesis' in window)){
      return reject(new Error('SpeechSynthesis not supported'));
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = rate;
    utter.pitch = pitch;
    utter.lang = lang;
    if(selectedVoice) utter.voice = selectedVoice;
    utter.onend = ()=> resolve();
    utter.onerror = (e)=> reject(e);
    speechSynthesis.cancel(); // stop any current speaking
    speechSynthesis.speak(utter);
  });
}

/* keep screen awake while playing */
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', ()=>{ wakeLock = null; });
    }
  }catch(err){
    // ignore (not supported or permission)
    // console.warn('WakeLock fail', err);
  }
}
async function releaseWakeLock(){
  try{
    if(wakeLock){
      await wakeLock.release();
      wakeLock = null;
    }
  }catch(e){}
}

/* Render UI for a list of sentences */
async function renderSentences(sentences){
  output.innerHTML = '';
  const container = document.createElement('div');
  sentences.forEach( (sent, idx) => {
    const sentId = 's-'+idx;
    const sentWrap = document.createElement('div');
    sentWrap.className = 'sentence';
    sentWrap.dataset.index = idx;
    sentWrap.id = sentId;

    const row = document.createElement('div');
    row.className = 'row';

    const spBtn = document.createElement('button');
    spBtn.className = 'speaker-btn';
    spBtn.title = 'Play this sentence';
    spBtn.innerHTML = '&#128266;'; // speaker icon
    spBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      playSentence(idx);
    });

    row.appendChild(spBtn);

    const wordsDiv = document.createElement('div');
    wordsDiv.className = 'words';

    const tokens = tokenizeSentence(sent);
    tokens.forEach( (tok, wIdx) => {
      const wordSpan = document.createElement('span');
      wordSpan.className = 'word';
      wordSpan.dataset.raw = tok;
      wordSpan.dataset.sentence = idx;
      wordSpan.dataset.wordIndex = wIdx;

      const textSpan = document.createElement('span');
      textSpan.className = 'text';
      textSpan.textContent = tok;

      const ipaDiv = document.createElement('div');
      ipaDiv.className = 'ipa';
      ipaDiv.textContent = ''; // fill later (async)

      wordSpan.appendChild(textSpan);
      wordSpan.appendChild(ipaDiv);

      // click a word: highlight and speak the single word
      wordSpan.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        clearAllHighlights();
        wordSpan.classList.add('highlight');
        const raw = wordSpan.dataset.raw;
        let ipa = '';
        if(!hasCJK(raw)){
          ipa = await fetchIPAForWord(raw);
          ipaDiv.textContent = ipa;
        } else {
          ipaDiv.textContent = '';
        }
        // speak the word (use the spoken word cleaned)
        const cleaned = normalizeTokenForLookup(raw).replace(/_/g,' ');
        await requestWakeLock();
        try{
          await speakText(cleaned, {lang:'en-US'});
        }catch(e){}
        // release wake lock only if nothing else playing (we'll be conservative and leave it until user stops)
      });

      wordsDiv.appendChild(wordSpan);

      // pre-fetch IPA asynchronously for visible words to improve UX
      (async ()=>{
        if(hasCJK(tok)) return;
        const ipa = await fetchIPAForWord(tok);
        ipaDiv.textContent = ipa;
      })();
    });

    // Sentence click & double-click events
    // click -> play sentence
    sentWrap.addEventListener('click', (ev)=>{
      ev.stopPropagation();
      playSentence(idx);
    });
    // double-click -> toggle looping read mode
    sentWrap.addEventListener('dblclick', (ev)=>{
      ev.stopPropagation();
      if(loopingSentenceId === idx){
        stopLooping();
      } else {
        startLooping(idx);
      }
    });

    row.appendChild(wordsDiv);
    sentWrap.appendChild(row);
    container.appendChild(sentWrap);
  });
  output.appendChild(container);
}

/* Play a sentence by index; highlights during playback.
   Stops any looping state on other sentences.
*/
async function playSentence(idx){
  stopLooping(); // any click should stop previous looping except if clicked on same and dblclick toggles
  const sentEl = document.querySelector('.sentence[data-index="'+idx+'"]');
  if(!sentEl) return;
  const text = reconstructSentenceText(sentEl);
  clearAllHighlights();
  sentEl.classList.add('highlight');
  try{
    await requestWakeLock();
    await speakText(text, {lang:'en-GB'});
  }catch(e){
    // ignore
  } finally {
    sentEl.classList.remove('highlight');
  }
}

/* Reconstruct sentence text from its word spans (to preserve original punctuation/spacing) */
function reconstructSentenceText(sentEl){
  const words = Array.from(sentEl.querySelectorAll('.word .text')).map(n=>n.textContent);
  // join with spaces but also fix cases where punctuation attached: if token starts with punctuation, avoid extra space.
  // Simpler: original sentence stored in dataset? Not stored — parse from words reconstruct:
  return words.join(' ');
}

/* Looping functionality: repeatedly play a sentence until stopped */
let loopCancel = false;
async function startLooping(idx){
  loopingSentenceId = idx;
  const sentEl = document.querySelector('.sentence[data-index="'+idx+'"]');
  if(!sentEl) return;
  document.querySelectorAll('.sentence').forEach(s=>s.classList.remove('loop'));
  sentEl.classList.add('loop');
  loopCancel = false;
  // continuous loop
  while(!loopCancel && loopingSentenceId === idx){
    clearAllHighlights();
    sentEl.classList.add('highlight');
    const text = reconstructSentenceText(sentEl);
    try{
      await requestWakeLock();
      await speakText(text, {lang:'en-GB'});
    }catch(e){}
    sentEl.classList.remove('highlight');
    // small pause between repeats
    await new Promise(r=>setTimeout(r, 300));
  }
  sentEl.classList.remove('loop');
  loopingSentenceId = null;
}

function stopLooping(){
  loopCancel = true;
  loopingSentenceId = null;
  document.querySelectorAll('.sentence.loop').forEach(n=>n.classList.remove('loop'));
}

/* Read whole document: read sentences sequentially with highlight following */
async function readAllSequential(sentences){
  await requestWakeLock();
  for(let i=0;i<sentences.length;i++){
    if(loopingSentenceId !== null) break; // if loop started elsewhere, stop sequence
    const sentEl = document.querySelector('.sentence[data-index="'+i+'"]');
    if(!sentEl) continue;
    clearAllHighlights();
    sentEl.classList.add('highlight');
    try{
      await speakText(sentences[i], {lang:'en-GB'});
    }catch(e){}
    sentEl.classList.remove('highlight');
    // slight pause
    await new Promise(r=>setTimeout(r, 120));
  }
  await releaseWakeLock();
}

/* Event handlers */
goBtn.addEventListener('click', async ()=>{
  const text = inputEl.value.trim();
  if(!text) return;
  const sentences = splitIntoSentences(text);
  await renderSentences(sentences);
});

title.addEventListener('click', async ()=>{
  // read all sentences in output
  const sEls = Array.from(document.querySelectorAll('.sentence'));
  const sentences = sEls.map(el => reconstructSentenceText(el));
  if(sentences.length === 0 && inputEl.value.trim()){
    // if output empty, auto-generate
    const arr = splitIntoSentences(inputEl.value.trim());
    await renderSentences(arr);
    await readAllSequential(arr);
  } else {
    await readAllSequential(sentences);
  }
});

releaseWakeBtn.addEventListener('click', async ()=>{
  await releaseWakeLock();
  alert('Wake lock released (if supported).');
});

clearBtn.addEventListener('click', ()=>{
  inputEl.value = '';
  output.innerHTML = '';
  ipaCache.clear();
});

/* click anywhere stops looping */
document.addEventListener('click', (ev)=>{
  // If clicked outside any .sentence, stop looping
  if(!ev.target.closest('.sentence')){
    stopLooping();
  }
});

/* ensure we release wake lock on page hide/unload */
document.addEventListener('visibilitychange', async ()=>{
  if(document.hidden){
    // when hidden, release wake lock to be polite
    await releaseWakeLock();
  }
});
window.addEventListener('beforeunload', async ()=>{
  await releaseWakeLock();
});
