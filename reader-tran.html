<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Reader</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #f7f8fa;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.title {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  color: #2c3e50;
  margin: 30px 0 20px;
  cursor: pointer;
}

#voiceSelect {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #fff;
  outline: none;
}

#inputArea {
  width: 100%;
  height: 180px;
  padding: 15px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  resize: vertical;
  outline: none;
  background: white;
}

#goBtn {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: 600;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 12px;
  margin: 12px 0 25px;
  cursor: pointer;
  transition: opacity 0.2s;
}

#goBtn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

#result {
  line-height: 1.8;
  font-size: 18px;
}

.sentence {
  display: flex;
  align-items: center;
  padding: 14px 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #fff;
  border: 1px solid #eee;
  transition: background 0.2s;
  cursor: pointer;
}

.sentence.active {
  background: #e1f5fe;
  border-color: #007aff;
}

.speaker {
  margin-right: 12px;
  font-size: 24px;
  user-select: none;
  flex-shrink: 0;
}

.word {
  display: inline-block;
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
}

.word.active {
  background: #ffeb3b;
  font-weight: 500;
}
</style>
</head>

<body>
  <div class="title">English Reader</div>

  <select id="voiceSelect"></select>

  <textarea id="inputArea" placeholder="Paste your English text here, or input Chinese to auto translate..."></textarea>
  <button id="goBtn">Go</button>
  <div id="result"></div>

<script>
const inputArea = document.getElementById('inputArea');
const goBtn = document.getElementById('goBtn');
const result = document.getElementById('result');
const voiceSelect = document.getElementById('voiceSelect');
const titleEl = document.querySelector('.title');

let allVoices = [];
let currentUtterance = null;

function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';
  allVoices.forEach((voice, i) => {
    if (voice.lang.includes('en')) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = `${voice.name} (${voice.lang})`;
      voiceSelect.appendChild(option);
    }
  });
  const samanthaIndex = allVoices.findIndex(v =>
    v.name.includes('Samantha') && v.lang.includes('en-US')
  );
  if (samanthaIndex !== -1) {
    voiceSelect.value = samanthaIndex;
  }
}

function getSelectedVoice() {
  return allVoices[voiceSelect.value] || allVoices.find(v => v.lang.includes('en-US'));
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ————————————————————————————————————————
// 新增：中文检测与翻译
// ————————————————————————————————————————
// 判断文本是否包含中文
function hasChinese(text) {
  return /[\u4e00-\u9fa5]/.test(text);
}

// 中文翻译成简单英语口语
async function translateChineseToEnglish(text) {
  try {
    const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=${encodeURIComponent(text)}`);
    const data = await response.json();
    // 拼接完整翻译结果（适配长文本）
    let translatedText = '';
    data[0].forEach(item => {
      translatedText += item[0];
    });
    return translatedText.trim();
  } catch (error) {
    console.error('翻译失败:', error);
    alert('翻译失败，请检查网络连接后重试');
    return null;
  }
}

// ————————————————————————————————————————
// 新版智能断句：只在真正句末拆分
// 保护：时间 3:30、U.S.A.、a.m.、Jan.1st 等
// ————————————————————————————————————————
goBtn.addEventListener('click', async () => {
  const originalText = inputArea.value.trim();
  if (!originalText) return;

  // 保存按钮原始状态，防止重复点击
  const originalBtnText = goBtn.textContent;
  goBtn.disabled = true;
  goBtn.textContent = '处理中...';

  let processText = originalText;

  // 检测到中文，先执行翻译
  if (hasChinese(originalText)) {
    goBtn.textContent = '翻译中...';
    const translatedText = await translateChineseToEnglish(originalText);
    // 翻译失败则终止操作，恢复按钮状态
    if (!translatedText) {
      goBtn.disabled = false;
      goBtn.textContent = originalBtnText;
      return;
    }
    // 翻译结果填充到输入框，完全兼容原有所有功能
    inputArea.value = translatedText;
    processText = translatedText;
  }

  // 原有断句+渲染逻辑，完全未修改
  const sentences = splitIntoRealSentences(processText);
  renderResult(sentences);

  // 恢复按钮原始状态
  goBtn.disabled = false;
  goBtn.textContent = originalBtnText;
});

function splitIntoRealSentences(text) {
  const s = text.replace(/\s+/g, ' ').trim();

  // 1. 保护 时间 12:30 3:30 这类冒号
  let t = s.replace(/(\d):(\d)/g, '$1⏱$2');

  // 2. 保护内部点：U.S.A. a.m. p.m. Mr. Dr. Jan. 等
  const protectPatterns = [
    /\b([A-Z])\.([A-Z])\.([A-Z])\./gi,
    /\b([A-Z])\.([A-Z])\./gi,
    /\b[a-z]\.[a-z]\./gi,
    /\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\./gi
  ];
  protectPatterns.forEach(re => {
    t = t.replace(re, m => m.replace(/\./g, '•'));
  });

  // 3. 只在 句末 . ! ? + 空格/结尾 处拆分
  const parts = t.split(/(?<=[.!?])\s+/);

  // 4. 还原符号
  return parts.map(p =>
    p.replace(/⏱/g, ':').replace(/•/g, '.').trim()
  ).filter(Boolean);
}

// 点击标题朗读全文
titleEl.addEventListener('click', () => {
  const fullText = inputArea.value.trim();
  if (!fullText) return;
  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));
  const u = new SpeechSynthesisUtterance(fullText);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
  currentUtterance = u;
});

// ———————————————————— 原有渲染与朗读完全不变 ————————————————————
function renderResult(segments) {
  result.innerHTML = '';
  segments.forEach(seg => {
    const sentenceDiv = document.createElement('div');
    sentenceDiv.className = 'sentence';

    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = '🔊';

    const wordsDiv = document.createElement('div');
    wordsDiv.style.width = '100%';

    const words = seg.split(/\s+/).filter(Boolean);
    words.forEach(word => {
      const w = document.createElement('span');
      w.className = 'word';
      w.textContent = word;
      w.onclick = (e) => {
        e.stopPropagation();
        speakWord(word, w);
      };
      wordsDiv.appendChild(w);
      wordsDiv.appendChild(document.createTextNode(' '));
    });

    sentenceDiv.appendChild(speaker);
    sentenceDiv.appendChild(wordsDiv);
    sentenceDiv.onclick = () => speakSentence(seg, sentenceDiv);
    result.appendChild(sentenceDiv);
  });
}

function speakSentence(text, sentenceEl) {
  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  u.pitch = 1.0;
  sentenceEl.classList.add('active');
  u.onend = () => sentenceEl.classList.remove('active');
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

function speakWord(word, wordEl) {
  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));
  wordEl.classList.add('active');
  const u = new SpeechSynthesisUtterance(word);
  u.voice = getSelectedVoice();
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
  }
}
</script>
</body>
</html>
