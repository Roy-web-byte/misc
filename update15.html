<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
        }
        
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1a56db;
            margin-bottom: 8px;
            cursor: pointer;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        h1:hover {
            background-color: rgba(26, 86, 219, 0.08);
        }
        
        .input-section {
            background-color: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        .input-header {
            margin-bottom: 15px;
            text-align: center;
        }
        
        .input-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        textarea {
            width: 100%;
            height: 150px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            padding: 18px;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.2s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #1a56db;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }
        
        .go-btn {
            background-color: #1a56db;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .go-btn:hover {
            background-color: #1546b8;
        }
        
        .stats {
            text-align: center;
            color: #86868b;
            font-size: 1rem;
            margin-top: 10px;
        }
        
        .output-section {
            background-color: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        .sentences-container {
            margin-top: 20px;
        }
        
        .sentence-item {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #f0f0f0;
            transition: all 0.2s;
            position: relative;
        }
        
        .sentence-item.highlighted {
            background-color: rgba(26, 86, 219, 0.05);
            border-color: rgba(26, 86, 219, 0.2);
        }
        
        .sentence-item.looping {
            background-color: rgba(255, 149, 0, 0.1);
            border-color: rgba(255, 149, 0, 0.3);
        }
        
        .sentence-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .sentence-number {
            background-color: #f5f5f7;
            color: #86868b;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: 12px;
        }
        
        .speaker-icon {
            color: #1a56db;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .speaker-icon:hover {
            background-color: rgba(26, 86, 219, 0.1);
        }
        
        .sentence-text {
            font-size: 1.3rem;
            line-height: 1.7;
            margin-bottom: 5px;
            cursor: pointer;
            padding: 5px 0;
        }
        
        .word-container {
            display: inline-block;
            position: relative;
            margin-right: 6px;
            padding: 3px 5px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        
        .word-container:hover {
            background-color: rgba(26, 86, 219, 0.08);
        }
        
        .word-container.highlighted {
            background-color: rgba(26, 86, 219, 0.15);
        }
        
        .word {
            font-size: 1.3rem;
            cursor: pointer;
        }
        
        .ipa {
            color: #1a56db;
            font-size: 0.85rem;
            display: block;
            margin-top: 2px;
            font-family: 'Arial', sans-serif;
        }
        
        .chinese-text {
            color: #1d1d1f;
            font-size: 1.3rem;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #86868b;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #1a56db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .input-section, .output-section {
                padding: 20px;
            }
            
            .sentence-text {
                font-size: 1.2rem;
            }
        }
        
        /* 高亮动画 */
        .highlighted-word {
            animation: highlightWord 0.5s ease;
        }
        
        @keyframes highlightWord {
            0% { background-color: rgba(26, 86, 219, 0); }
            50% { background-color: rgba(26, 86, 219, 0.2); }
            100% { background-color: rgba(26, 86, 219, 0.1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">English Reader</h1>
        </header>
        
        <section class="input-section">
            <div class="input-header">
                <h2>输入英文文本</h2>
            </div>
            <textarea id="textInput" placeholder="粘贴或输入英文文本"></textarea>
            <div class="controls">
                <button class="go-btn" id="processBtn">
                    <i class="fas fa-play"></i> Go
                </button>
            </div>
            <div class="stats" id="stats">0 单词</div>
        </section>
        
        <section class="output-section">
            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p>正在处理文本并获取音标...</p>
            </div>
            
            <div class="sentences-container" id="sentencesContainer">
                <!-- 句子将在这里动态生成 -->
                <div class="placeholder-text">
                    <p style="text-align: center; color: #86868b; padding: 40px 0;">
                        处理后的文本将显示在这里
                    </p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 全局变量
        let sentences = [];
        let currentSentenceIndex = 0;
        let isLooping = false;
        let loopingSentence = null;
        let wordCache = new Map(); // 单词音标缓存
        let speechSynthesis = window.speechSynthesis;
        let selectedVoice = null;
        let wakeLock = null;
        
        // 常见英文缩写列表，防止错误断句
        const abbreviations = new Set([
            'Mr.', 'Mrs.', 'Ms.', 'Dr.', 'Prof.', 'Capt.', 'Lt.', 'Rev.', 'St.', 
            'Jr.', 'Sr.', 'U.S.A.', 'U.S.', 'U.K.', 'A.M.', 'P.M.', 'e.g.', 'i.e.', 
            'etc.', 'vs.', 'approx.', 'dept.', 'est.', 'min.', 'max.', 'no.', 
            'vol.', 'fig.', 'eq.', 'ref.', 'sec.', 'ch.', 'p.', 'pp.', 'ex.', 
            'cf.', 'ca.', 'et al.', 'ibid.', 'op. cit.', 'loc. cit.', 'viz.', 
            'Ph.D.', 'M.D.', 'B.A.', 'M.A.', 'B.Sc.', 'M.Sc.', 'LL.B.', 'LL.M.', 
            'J.D.', 'D.D.S.', 'D.V.M.', 'vs.', 'vs', 'approx', 'dept', 'est',
            'min', 'max', 'no', 'vol', 'fig', 'eq', 'ref', 'sec', 'ch', 'p',
            'pp', 'ex', 'cf', 'ca', 'Inc.', 'Co.', 'Corp.', 'Ltd.', 'etc'
        ]);
        
        // 初始化函数
        function init() {
            // 获取DOM元素
            const textInput = document.getElementById('textInput');
            const processBtn = document.getElementById('processBtn');
            const title = document.getElementById('title');
            const sentencesContainer = document.getElementById('sentencesContainer');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            // 事件监听器
            processBtn.addEventListener('click', processText);
            
            // 语音合成初始化
            initSpeechSynthesis();
            
            // 点击标题事件
            title.addEventListener('click', () => {
                playAllSentences();
                toggleWakeLock();
            });
            
            // 点击外部时停止循环朗读
            document.addEventListener('click', (e) => {
                if (isLooping && !e.target.closest('.sentence-item')) {
                    stopLooping();
                }
            });
        }
        
        // 初始化语音合成
        function initSpeechSynthesis() {
            if (!speechSynthesis) {
                console.warn('浏览器不支持语音合成');
                return;
            }
            
            // 语音列表加载事件
            speechSynthesis.addEventListener('voiceschanged', () => {
                const voices = speechSynthesis.getVoices();
                if (voices.length > 0) {
                    selectedVoice = getPreferredVoice(voices);
                }
            });
            
            // 获取初始语音列表
            const voices = speechSynthesis.getVoices();
            if (voices.length > 0) {
                selectedVoice = getPreferredVoice(voices);
            }
        }
        
        // 获取首选语音（优先Samantha，然后英式英语，然后美式英语）
        function getPreferredVoice(voices) {
            // 首选Samantha
            const samantha = voices.find(voice => 
                voice.name.includes('Samantha') || 
                voice.name.toLowerCase().includes('samantha')
            );
            
            if (samantha) {
                return samantha;
            }
            
            // 其次英式英语
            const britishVoices = voices.filter(voice => 
                voice.lang.startsWith('en-GB') || 
                voice.name.toLowerCase().includes('british') ||
                voice.name.toLowerCase().includes('uk')
            );
            
            if (britishVoices.length > 0) {
                return britishVoices[0];
            }
            
            // 其次美式英语
            const americanVoices = voices.filter(voice => 
                voice.lang.startsWith('en-US') || 
                voice.name.toLowerCase().includes('american') ||
                voice.name.toLowerCase().includes('us')
            );
            
            if (americanVoices.length > 0) {
                return americanVoices[0];
            }
            
            // 默认选择英语语音
            const englishVoices = voices.filter(voice => voice.lang.startsWith('en'));
            if (englishVoices.length > 0) {
                return englishVoices[0];
            }
            
            // 返回默认语音
            return voices.find(voice => voice.default) || voices[0];
        }
        
        // 处理文本
        async function processText() {
            const textInput = document.getElementById('textInput');
            const text = textInput.value.trim();
            
            if (!text) {
                alert('请输入英文文本');
                return;
            }
            
            // 显示加载指示器
            document.getElementById('loadingIndicator').classList.add('active');
            
            // 清空容器
            const sentencesContainer = document.getElementById('sentencesContainer');
            sentencesContainer.innerHTML = '';
            
            // 分割句子
            sentences = splitIntoSentences(text);
            
            // 处理每个句子
            for (let i = 0; i < sentences.length; i++) {
                const sentence = sentences[i];
                const sentenceElement = await createSentenceElement(sentence, i + 1);
                sentencesContainer.appendChild(sentenceElement);
                
                // 更新进度
                if (i % 3 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }
            
            // 隐藏加载指示器
            document.getElementById('loadingIndicator').classList.remove('active');
            
            // 更新统计
            updateStats(countWords(text));
        }
        
        // 精确断句函数
        function splitIntoSentences(text) {
            if (!text.trim()) return [];
            
            // 改进的断句逻辑
            let result = [];
            let currentSentence = '';
            
            // 将文本拆分为字符数组进行处理
            const chars = text.split('');
            
            for (let i = 0; i < chars.length; i++) {
                currentSentence += chars[i];
                
                // 检查是否到达句子结束
                if (isSentenceEnd(chars, i, text)) {
                    result.push(currentSentence.trim());
                    currentSentence = '';
                }
            }
            
            // 添加最后一个句子（如果有）
            if (currentSentence.trim()) {
                result.push(currentSentence.trim());
            }
            
            return result.filter(sentence => sentence.length > 0);
        }
        
        // 判断是否句子结束
        function isSentenceEnd(chars, index, text) {
            const char = chars[index];
            const nextChar = index < chars.length - 1 ? chars[index + 1] : '';
            
            // 检查是否是句子终止符
            if (/[.!?。？！]/.test(char)) {
                // 检查是否是缩写的一部分
                if (isAbbreviation(chars, index, text)) {
                    return false;
                }
                
                // 检查下一个字符是否是空格或结束
                if (/\s/.test(nextChar) || nextChar === '') {
                    return true;
                }
                
                // 检查是否是引号结束
                if (/['"”]/.test(nextChar)) {
                    // 确保引号后是空格或结束
                    const charAfterQuote = index < chars.length - 2 ? chars[index + 2] : '';
                    if (/\s/.test(charAfterQuote) || charAfterQuote === '') {
                        return true;
                    }
                }
            }
            
            return false;
        }
        
        // 检查是否是缩写
        function isAbbreviation(chars, index, text) {
            // 获取当前位置之前的几个字符
            const start = Math.max(0, index - 10);
            const substring = text.substring(start, index + 1);
            
            // 检查是否匹配已知缩写
            for (const abbr of abbreviations) {
                if (substring.endsWith(abbr)) {
                    return true;
                }
            }
            
            // 检查是否是单字母缩写（如 "A." 或 "B."）
            if (index >= 1) {
                const prevChar = chars[index - 1];
                if (/[A-Za-z]/.test(prevChar) && (index === 1 || /\s/.test(chars[index - 2]))) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 创建句子元素
        async function createSentenceElement(sentence, index) {
            const sentenceDiv = document.createElement('div');
            sentenceDiv.className = 'sentence-item';
            sentenceDiv.dataset.index = index;
            sentenceDiv.dataset.text = sentence;
            
            // 句子头部
            const headerDiv = document.createElement('div');
            headerDiv.className = 'sentence-header';
            
            const numberDiv = document.createElement('div');
            numberDiv.className = 'sentence-number';
            numberDiv.textContent = index;
            
            const speakerIcon = document.createElement('i');
            speakerIcon.className = 'fas fa-volume-up speaker-icon';
            speakerIcon.title = '朗读此句';
            
            // 单击句子朗读
            speakerIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                speakSentence(sentence, sentenceDiv);
            });
            
            headerDiv.appendChild(numberDiv);
            headerDiv.appendChild(speakerIcon);
            
            // 句子文本
            const textDiv = document.createElement('div');
            textDiv.className = 'sentence-text';
            
            // 分割单词并添加音标
            const wordsWithIpa = await splitSentenceIntoWordsWithIpa(sentence);
            textDiv.innerHTML = wordsWithIpa;
            
            // 单击句子事件
            textDiv.addEventListener('click', (e) => {
                if (e.target.classList.contains('word')) {
                    return; // 单词点击事件会单独处理
                }
                speakSentence(sentence, sentenceDiv);
            });
            
            // 双击句子进入循环模式
            let clickTimer = null;
            textDiv.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                }
                
                if (isLooping && loopingSentence === sentenceDiv) {
                    stopLooping();
                } else {
                    startLooping(sentence, sentenceDiv);
                }
            });
            
            // 防止双击误触发单击
            textDiv.addEventListener('mousedown', () => {
                clickTimer = setTimeout(() => {
                    clickTimer = null;
                }, 300);
            });
            
            sentenceDiv.appendChild(headerDiv);
            sentenceDiv.appendChild(textDiv);
            
            return sentenceDiv;
        }
        
        // 分割句子为单词并获取音标
        async function splitSentenceIntoWordsWithIpa(sentence) {
            // 使用正则表达式分割单词，保留标点符号
            const wordRegex = /([\w'’]+|[^\w\s])/g;
            const tokens = sentence.match(wordRegex) || [];
            
            let result = '';
            
            for (const token of tokens) {
                // 检查是否是单词（包含字母或数字）
                if (/[\w'’]/.test(token) && !/^\d+$/.test(token)) {
                    // 获取音标
                    const ipa = await getIpaForWord(token);
                    
                    // 创建单词容器
                    result += `<span class="word-container"><span class="word" data-word="${token}">${token}</span>`;
                    
                    if (ipa) {
                        result += `<span class="ipa">${ipa}</span>`;
                    }
                    
                    result += '</span>';
                } else if (/[\u4e00-\u9fa5]/.test(token)) {
                    // 中文，不加音标
                    result += `<span class="chinese-text">${token}</span>`;
                } else {
                    // 标点符号或其他
                    result += `<span>${token}</span>`;
                }
                
                // 添加空格（除非是中文标点）
                if (!/[。？！，；：、]/.test(token)) {
                    result += ' ';
                }
            }
            
            return result;
        }
        
        // 获取单词的音标
        async function getIpaForWord(word) {
            // 清理单词：去除所有格符号和标点
            const cleanWord = word.replace(/[''']/g, '').toLowerCase();
            
            // 检查缓存
            if (wordCache.has(cleanWord)) {
                return wordCache.get(cleanWord);
            }
            
            // 如果是常见缩写，返回空
            if (abbreviations.has(word) || abbreviations.has(word + '.')) {
                wordCache.set(cleanWord, '');
                return '';
            }
            
            // 尝试从字典API获取音标
            try {
                // 使用免费字典API
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${cleanWord}`);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data && data[0] && data[0].phonetics && data[0].phonetics.length > 0) {
                        // 查找英式音标
                        let ipa = '';
                        
                        for (const phonetic of data[0].phonetics) {
                            if (phonetic.text) {
                                ipa = phonetic.text;
                                // 优先选择包含"UK"的音标
                                if (phonetic.text.includes('UK') || phonetic.audio && phonetic.audio.includes('uk')) {
                                    break;
                                }
                            }
                        }
                        
                        // 如果没有找到音标文本，尝试从第一个音标获取
                        if (!ipa && data[0].phonetics[0].text) {
                            ipa = data[0].phonetics[0].text;
                        }
                        
                        // 清理音标格式
                        if (ipa) {
                            ipa = ipa.replace(/^\//, '').replace(/\/$/, '');
                            wordCache.set(cleanWord, ipa);
                            return ipa;
                        }
                    }
                }
            } catch (error) {
                console.warn(`无法获取单词 "${word}" 的音标:`, error);
            }
            
            // 如果API失败，使用规则生成简单音标（占位符）
            // 这是一个简化的规则，实际应用中应该使用更复杂的规则或API
            let generatedIpa = '';
            
            // 简单规则：根据音节数添加重音符号
            if (cleanWord.length <= 2) {
                generatedIpa = `/${cleanWord}/`;
            } else if (cleanWord.length <= 4) {
                generatedIpa = `/ˈ${cleanWord}/`;
            } else {
                generatedIpa = `/ˌ${cleanWord}/`;
            }
            
            wordCache.set(cleanWord, generatedIpa);
            return generatedIpa;
        }
        
        // 朗读句子
        function speakSentence(sentence, sentenceElement = null) {
            if (!speechSynthesis) {
                alert('您的浏览器不支持语音合成功能');
                return;
            }
            
            // 停止当前语音
            speechSynthesis.cancel();
            
            // 高亮句子
            if (sentenceElement) {
                document.querySelectorAll('.sentence-item').forEach(item => {
                    item.classList.remove('highlighted');
                });
                sentenceElement.classList.add('highlighted');
                
                // 5秒后移除高亮
                setTimeout(() => {
                    sentenceElement.classList.remove('highlighted');
                }, 5000);
            }
            
            // 创建语音
            const utterance = new SpeechSynthesisUtterance(sentence);
            
            // 设置语音
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }
            
            // 设置语音参数
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            
            // 开始朗读
            speechSynthesis.speak(utterance);
        }
        
        // 开始循环朗读
        function startLooping(sentence, sentenceElement) {
            if (isLooping) {
                stopLooping();
            }
            
            isLooping = true;
            loopingSentence = sentenceElement;
            sentenceElement.classList.add('looping');
            
            // 创建循环函数
            const loopSpeak = () => {
                if (!isLooping) return;
                
                speakSentence(sentence, sentenceElement);
                
                // 语音结束后再次触发
                const utterance = new SpeechSynthesisUtterance(sentence);
                if (selectedVoice) utterance.voice = selectedVoice;
                
                utterance.onend = () => {
                    if (isLooping) {
                        setTimeout(loopSpeak, 500);
                    }
                };
                
                speechSynthesis.speak(utterance);
            };
            
            loopSpeak();
        }
        
        // 停止循环朗读
        function stopLooping() {
            isLooping = false;
            if (loopingSentence) {
                loopingSentence.classList.remove('looping');
                loopingSentence = null;
            }
            speechSynthesis.cancel();
        }
        
        // 朗读所有句子
        async function playAllSentences() {
            if (sentences.length === 0) {
                alert('请先输入文本并点击"Go"');
                return;
            }
            
            // 停止当前语音和循环
            stopLooping();
            speechSynthesis.cancel();
            
            // 重置索引
            currentSentenceIndex = 0;
            
            // 开始朗读
            playNextSentence();
        }
        
        // 朗读下一句
        function playNextSentence() {
            if (currentSentenceIndex >= sentences.length) {
                // 所有句子朗读完成
                document.querySelectorAll('.sentence-item').forEach(item => {
                    item.classList.remove('highlighted');
                });
                return;
            }
            
            const sentence = sentences[currentSentenceIndex];
            const sentenceElement = document.querySelector(`.sentence-item[data-index="${currentSentenceIndex + 1}"]`);
            
            if (sentenceElement) {
                // 高亮当前句子
                document.querySelectorAll('.sentence-item').forEach(item => {
                    item.classList.remove('highlighted');
                });
                sentenceElement.classList.add('highlighted');
                
                // 滚动到可视区域
                sentenceElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            // 创建语音
            const utterance = new SpeechSynthesisUtterance(sentence);
            if (selectedVoice) utterance.voice = selectedVoice;
            
            // 语音结束后朗读下一句
            utterance.onend = () => {
                // 移除高亮
                if (sentenceElement) {
                    setTimeout(() => {
                        sentenceElement.classList.remove('highlighted');
                    }, 300);
                }
                
                // 增加索引并朗读下一句
                currentSentenceIndex++;
                setTimeout(playNextSentence, 500);
            };
            
            // 开始朗读
            speechSynthesis.speak(utterance);
        }
        
        // 切换屏幕常亮
        async function toggleWakeLock() {
            if (!('wakeLock' in navigator)) {
                console.log('您的浏览器不支持屏幕常亮功能');
                return;
            }
            
            if (wakeLock) {
                // 释放唤醒锁
                await wakeLock.release();
                wakeLock = null;
            } else {
                try {
                    // 请求唤醒锁
                    wakeLock = await navigator.wakeLock.request('screen');
                    
                    // 处理唤醒锁释放
                    wakeLock.addEventListener('release', () => {
                        console.log('屏幕常亮已释放');
                    });
                } catch (err) {
                    console.error(`唤醒锁请求失败: ${err.message}`);
                }
            }
        }
        
        // 更新统计信息
        function updateStats(wordCount) {
            document.getElementById('stats').textContent = `${wordCount} 单词`;
        }
        
        // 统计单词数
        function countWords(text) {
            if (!text.trim()) return 0;
            return text.split(/\s+/).filter(word => word.length > 0).length;
        }
        
        // 添加单词点击事件监听器（事件委托）
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('word')) {
                const word = e.target.dataset.word;
                const wordContainer = e.target.closest('.word-container');
                
                // 高亮单词
                document.querySelectorAll('.word-container').forEach(container => {
                    container.classList.remove('highlighted');
                });
                wordContainer.classList.add('highlighted');
                
                // 添加高亮动画
                wordContainer.classList.add('highlighted-word');
                setTimeout(() => {
                    wordContainer.classList.remove('highlighted-word');
                }, 500);
                
                // 朗读单词
                if (speechSynthesis) {
                    speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(word);
                    if (selectedVoice) utterance.voice = selectedVoice;
                    speechSynthesis.speak(utterance);
                }
            }
        });
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
