<tag>
  <!--修改书签标题-->
</tag><!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HIIT Timer</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px 0;
    box-sizing: border-box;
    gap: 20px;
  }

  h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
  }

  .display-area {
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .round-info, .status-label {
    font-size: 18px; 
    color: #636366; 
    height: 24px;
    letter-spacing: 1px;
  }

  .time {
    font-size: 160px; 
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin: 5px 0;
    color: #fff; /* 默认白色 */
    transition: color 0.3s ease;
  }

  .settings {
    background: #1c1c1e;
    padding: 20px;
    border-radius: 16px;
    width: 80%;
    max-width: 280px;
  }

  .input-group {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .input-group:last-child {
    margin-bottom: 0;
  }

  .input-group label {
    font-size: 16px;
    color: #aeaeb2;
  }

  input {
    width: 90px;
    padding: 10px;
    font-size: 18px;
    text-align: center;
    background: #2c2c2e;
    border: none;
    color: #fff;
    border-radius: 10px;
    outline: none;
  }

  input::placeholder {
    color: #636366;
  }

  .button-group {
    display: flex;
    gap: 15px;
    width: 85%;
    max-width: 320px;
  }

  button {
    flex: 1;
    padding: 16px;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }

  button:active {
    transform: scale(0.96);
    opacity: 0.8;
  }

  /* 颜色互换：开始按钮变为红色，结束按钮变为绿色 */
  .start { background: #ff3b30; } 
  .reset { background: #34c759; }
</style>
</head>

<body>

<h1>🏋️ HIIT Timer</h1>

<div class="display-area">
  <div class="round-info" id="round-info">准备就绪</div>
  <div class="time" id="time">00</div>
  <div class="status-label" id="status-label">READY</div>
</div>

<div class="settings">
  <div class="input-group">
    <label>训练时间</label>
    <input type="text" id="work" placeholder="30秒" inputmode="numeric" 
           onfocus="handleFocus(this)" onblur="handleBlur(this, '秒')">
  </div>
  <div class="input-group">
    <label>休息时间</label>
    <input type="text" id="rest" placeholder="60秒" inputmode="numeric" 
           onfocus="handleFocus(this)" onblur="handleBlur(this, '秒')">
  </div>
  <div class="input-group">
    <label>训练组数</label>
    <input type="text" id="rounds" placeholder="5组" inputmode="numeric" 
           onfocus="handleFocus(this)" onblur="handleBlur(this, '组')">
  </div>
</div>

<div class="button-group">
  <button class="start" onclick="start()">开始训练</button>
  <button class="reset" onclick="reset()">结束训练</button>
</div>

<script>
let state = "idle"
let currentRound = 1
let totalRounds = 0
let workTime = 0
let restTime = 0
let phase = "work" 
let endTime = 0
let rafId = null
let lastSecond = -1
let isFinished = false;
let tempMemory = ""; 

// 1. 本地缓存加载
window.onload = () => {
  const w = localStorage.getItem('hiit_work');
  const r = localStorage.getItem('hiit_rest');
  const rnd = localStorage.getItem('hiit_rounds');
  if (w) document.getElementById('work').value = w + "秒";
  if (r) document.getElementById('rest').value = r + "秒";
  if (rnd) document.getElementById('rounds').value = rnd + "组";
};

// 2. 合成音效系统
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTick() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

function playWhistle() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(2500, audioCtx.currentTime + 0.1);
  osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.4);
}

function playVictory() {
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
    gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i * 0.15 + 0.05);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.15 + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.15);
    osc.stop(audioCtx.currentTime + i * 0.15 + 0.2);
  });
}

// 3. 业务逻辑

function handleFocus(el) {
  if (state === "running") reset();
  tempMemory = el.value; 
  el.value = ""; 
}

function handleBlur(el, unit) {
  let val = el.value.trim();
  if (val === "") {
    el.value = tempMemory; 
  } else if (!isNaN(val)) {
    el.value = val + unit; 
  }
}

function speak(text, callback) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  if (callback) utter.onend = callback;
  speechSynthesis.speak(utter);
}

let wakeLock = null;
async function keepAwake() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
  }
}

function format(t) { return t < 10 ? "0" + t : t; }

function loop() {
  if (state !== "running") return;
  const now = Date.now();
  let left = Math.max(0, Math.ceil((endTime - now) / 1000));
  document.getElementById("time").innerText = format(left);

  if (left !== lastSecond && left > 0) {
    playTick();
    lastSecond = left;
  }
  if (left <= 0) nextPhase();
  rafId = requestAnimationFrame(loop);
}

function nextPhase() {
  lastSecond = -1;
  const timeEl = document.getElementById("time");
  if (phase === "work") {
    if (currentRound >= totalRounds) {
      finish();
      return;
    }
    phase = "rest";
    document.body.style.background = "#1c1c1e";
    timeEl.style.color = "#34c759"; // 休息时变绿
    speak("Rest");
    document.getElementById("round-info").innerText = "第 " + currentRound + " 组";
    document.getElementById("status-label").innerText = "休息中";
    endTime = Date.now() + restTime * 1000;
  } else {
    currentRound++;
    phase = "work";
    document.body.style.background = "#111";
    timeEl.style.color = "#ff3b30"; // 训练时变红
    speak("Round " + currentRound);
    document.getElementById("round-info").innerText = "第 " + currentRound + " 组";
    document.getElementById("status-label").innerText = "训练中";
    endTime = Date.now() + workTime * 1000;
  }
}

function start() {
  if (state === "running") return;
  initAudio();
  
  const wRaw = document.getElementById("work").value.replace(/秒|组/g, "");
  const rRaw = document.getElementById("rest").value.replace(/秒|组/g, "");
  const rndRaw = document.getElementById("rounds").value.replace(/秒|组/g, "");

  workTime = parseInt(wRaw) || 30;
  restTime = parseInt(rRaw) || 60;
  totalRounds = parseInt(rndRaw) || 5;

  if(wRaw) localStorage.setItem('hiit_work', wRaw);
  if(rRaw) localStorage.setItem('hiit_rest', rRaw);
  if(rndRaw) localStorage.setItem('hiit_rounds', rndRaw);

  currentRound = 1;
  phase = "work";
  state = "running";
  isFinished = false;
  lastSecond = -1;
  document.body.style.background = "#111";
  document.getElementById("time").style.color = "#ff3b30"; // 初始训练变红

  playWhistle(); 
  speak("Round 1");
  document.getElementById("round-info").innerText = "第 1 组";
  document.getElementById("status-label").innerText = "训练中";
  endTime = Date.now() + workTime * 1000;

  keepAwake();
  loop();
}

function reset() {
  if (state === "idle" || isFinished) return;

  state = "idle";
  cancelAnimationFrame(rafId);
  document.body.style.background = "#111";
  
  const timeEl = document.getElementById("time");
  timeEl.innerText = "00";
  timeEl.style.color = "#fff"; // 重置后变回白色
  document.getElementById("status-label").innerText = "已结束";
  
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

function finish() {
  state = "idle";
  isFinished = true;
  cancelAnimationFrame(rafId);
  document.body.style.background = "#111";
  
  const timeEl = document.getElementById("time");
  timeEl.style.color = "#fff"; // 完成后变回白色
  document.getElementById("round-info").innerText = "第 " + totalRounds + " 组";
  document.getElementById("status-label").innerText = "完成 🎉";
  
  speak("Workout complete", () => {
    playVictory(); 
  });
}
</script>

</body>
</html>
