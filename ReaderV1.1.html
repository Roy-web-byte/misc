<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="apple-mobile-web-app-title" content="EngReader">
        <meta name="theme-color" content="#007aff">
        <link rel="apple-touch-icon" href="https://github.githubassets.com/favicon.ico">
        
        <link rel="manifest" href='data:application/manifest+json,{"name":"English Reader Pro","short_name":"Reader","start_url":".","display":"standalone","background_color":"#f7f8fa","theme_color":"#007aff","icons":[{"src":"https://github.githubassets.com/favicon.ico","sizes":"512x512","type":"image/png"}]}'>

        <link rel="shortcut icon" href="https://github.githubassets.com/favicon.ico" type="image/x-icon">
        <link rel="icon" href="https://github.githubassets.com/favicon.ico" type="image/x-icon">
        <title>English Reader - Pro Linking</title>
        <style>
            :root {
                --result-fs: 22px;
                --new-word-fs: 22px;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                -webkit-tap-highlight-color: transparent; /* 优化移动端点击反馈 */
            }
            body {
                background: #f7f8fa;
                padding: 20px;
                max-width: 800px;
                margin: 0 auto;
                position: relative;
                padding-bottom: 20px;
                -webkit-user-select: none; /* 防止长按弹出系统菜单干扰功能 */
                user-select: none;
            }
            /* 允许输入框和结果区选中文本 */
            #inputArea, .word, .sentence, .new-word-item, .link-phonetic {
                -webkit-user-select: text;
                user-select: text;
            }

            .title {
                text-align: center;
                font-size: 32px;
                font-weight: bold;
                color: #2c3e50;
                margin: 30px 0 20px;
                cursor: pointer;
                user-select: none;
                touch-action: pan-y;
            }

            #fontSettings {
                display: none;
                background: white;
                padding: 20px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                margin-bottom: 15px;
                border: 1px solid #eee;
            }
            .setting-item { margin-bottom: 15px; }
            .setting-item label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
            .setting-item input[type="range"] {
                width: 100%; height: 6px; background: #ddd; border-radius: 5px; outline: none; -webkit-appearance: none;
            }
            .setting-item input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none; width: 20px; height: 20px; background: #007aff; border-radius: 50%; cursor: pointer;
            }
            .hide-settings-btn {
                width: 100%; padding: 10px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            }

            #inputArea {
                width: 100%;
                height: 48px;
                padding: 12px 15px;
                font-size: 17px;
                line-height: 1.5;
                border: 1px solid #ddd;
                border-radius: 12px;
                resize: none;
                outline: none;
                background: white;
                color: #333;
                transition: height 0.3s ease;
                overflow: hidden;
            }
            #inputArea:focus {
                height: 180px;
                overflow-y: auto;
                border-color: #007aff;
            }
            #inputArea::placeholder { color: #888; font-size: 16px; }
            
            #goBtn {
                width: 100%;
                padding: 14px;
                font-size: 18px;
                font-weight: 600;
                background: #007aff;
                color: white;
                border: none;
                border-radius: 12px;
                margin: 12px 0 12px;
                cursor: pointer;
            }
            #wordCount { text-align: center; font-size: 16px; color: #666; margin-bottom: 10px; min-height: 24px; }
            
            #navHistory {
                display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; gap: 8px;
            }
            .history-arrows { display: flex; justify-content: center; align-items: center; gap: 20px; }
            .history-arrow { font-size: 24px; cursor: pointer; color: #007aff; user-select: none; }
            .history-arrow.disabled { opacity: 0.5; cursor: not-allowed; }
            #historyTime { font-size: 13px; color: #888; min-height: 20px; }
            
            #result {
                line-height: 1.8;
                font-size: var(--result-fs);
                margin-bottom: 20px;
                padding-bottom: 120px;
            }
            .sentence {
                display: flex; align-items: center; padding: 16px 18px; border-radius: 10px; margin-bottom: 10px;
                background: #fff; border: 1px solid #eee; transition: all 0.2s ease; cursor: pointer; user-select: none; scroll-margin: 100px;
            }
            .sentence.active { background: #e1f5fe; border-color: #007aff; }
            
            .word { 
                display: inline; 
                padding: 2px 4px; 
                border-radius: 4px; 
                cursor: pointer; 
                -webkit-box-decoration-break: clone;
                box-decoration-break: clone;
            }
            .word.active { background: #ffeb3b; font-weight: 500; }
            
            .link-phonetic {
                background-color: transparent; 
                border-bottom: 3px solid #d0d0d0; 
                padding: 0 2px 2px 2px;
                margin: 0 1px; 
                display: inline; 
                line-height: 1.5;
                -webkit-box-decoration-break: clone;
                box-decoration-break: clone;
            }
            .link-phonetic.active { background-color: #ffeb3b; border-bottom-color: #fbc02d; }

            #newWordsArea { margin-top: 30px; padding-top: 20px; padding-bottom: 100px; border-top: 2px solid #e0e0e0; }
            .new-words-title { font-size: 20px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
            #newWordsList { display: flex; flex-wrap: wrap; gap: 10px; }
            .new-word-item {
                display: inline-flex; align-items: center; padding: 8px 12px; background-color: #f0f7ff;
                border: 1px solid #c2e0ff; border-radius: 20px; font-size: var(--new-word-fs); color: #0066cc; cursor: pointer;
            }

            #addWordBtn, #removeWordBtn {
                position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
                width: 60px; height: 60px; border-radius: 50%; background: #007aff;
                color: white; border: none; font-size: 28px; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s;
            }
            #addWordBtn.show, #removeWordBtn.show { opacity: 1; visibility: visible; }
            
            .trash-btn {
                position: fixed; bottom: 30px; width: 60px; height: 60px; border-radius: 50%;
                background: #007aff; color: white; border: none; font-size: 28px; opacity: 0; visibility: hidden; z-index: 99; transition: all 0.3s;
            }
            .trash-btn.show { opacity: 0.9; visibility: visible; }
            .trash-btn.pressed { background: #ff3b30; }
            #trashBtnLeft { left: 60px; }
            #trashBtnRight { right: 60px; }
            
            #backToTopBtn {
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                background: #007aff; color: white; width: 60px; height: 60px; border-radius: 50%;
                border: none; font-size: 28px; z-index: 100; opacity: 0; visibility: hidden;
            }
            #backToTopBtn.show { opacity: 0.9; visibility: visible; }
        </style>
    </head>
    <body>
        <div class="title">English Reader</div>

        <div id="fontSettings">
            <div class="setting-item">
                <label>结果区字体 (Result): <span id="resVal">22</span>px</label>
                <input type="range" id="resSizeSlider" min="16" max="40" value="22">
            </div>
            <div class="setting-item">
                <label>生词区字体 (New Words): <span id="wordVal">22</span>px</label>
                <input type="range" id="wordSizeSlider" min="16" max="40" value="22">
            </div>
            <div class="setting-item">
                <label>全文朗读速度 (Full Text): <span id="fullSpeedVal">1</span>x</label>
                <input type="range" id="fullSpeedSlider" min="1" max="2" step="0.1" value="1">
            </div>
            <div class="setting-item">
                <label>单句/单词速度 (Individual): <span id="indivSpeedVal">1</span>x</label>
                <input type="range" id="indivSpeedSlider" min="1" max="2" step="0.1" value="1">
            </div>
            <button class="hide-settings-btn" id="hideSettings">OK</button>
        </div>

        <textarea id="inputArea" placeholder="Paste your English text here..."></textarea>
        <button id="goBtn">Go</button>
        <div id="wordCount"></div>
        <div id="navHistory" style="display: none;">
            <div class="history-arrows">
                <span id="prevHistory" class="history-arrow">&#9664;&#xFE0E;</span>
                <span id="nextHistory" class="history-arrow">&#9654;&#xFE0E;</span>
            </div>
            <div id="historyTime"></div>
        </div>
        <div id="result"></div>
        <div id="newWordsArea" style="display: none;">
            <div class="new-words-title">📚 New Words</div>
            <div id="newWordsList"></div>
        </div>
        
        <button id="addWordBtn">+</button>
        <button id="removeWordBtn">−</button>
        <button id="trashBtnLeft" class="trash-btn">🗑️</button>
        <button id="trashBtnRight" class="trash-btn">🗑️</button>
        <button id="backToTopBtn">↑</button>

<script>
    // PWA Service Worker 注册逻辑 (使用 Blob 维持单文件特性)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                const CACHE_NAME = 'reader-v1';
                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(['./'])));
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW registration failed'));
        });
    }

    const VOWELS = ['a', 'e', 'i', 'o', 'u'];
    const STOP_PUNCS = [',', '.', '!', '?', ';', ':', '"', '(', ')'];
    const PLOSIVES = ['p', 'b', 't', 'd', 'k', 'g'];
    const FRICATIVES = ['f', 'v', 's', 'z', 'h', 'l', 'm', 'n', 'r', 'w', 'j'];

    const clean = (w) => w.replace(/[^a-zA-Z]/g, '').toLowerCase();

    const getEndingSound = (word) => {
        const w = clean(word);
        if (!w) return '';
        if (w.length > 2 && w.endsWith('e')) {
            const beforeE = w[w.length - 2];
            if (['the', 'he', 'she', 'me', 'we', 'be'].includes(w)) return 'vowel';
            if (VOWELS.includes(beforeE)) return 'vowel';
            return beforeE;
        }
        if (w.endsWith('y')) return 'vowel';
        if (VOWELS.includes(w[w.length - 1])) return 'vowel';
        return w[w.length - 1];
    };

    const getStartingSound = (word) => {
        const w = clean(word);
        if (!w) return '';
        const silentH = ['hour', 'hours', 'honest', 'honestly', 'honor', 'honour', 'he', 'him', 'his', 'her'];
        if (silentH.includes(w)) return 'vowel';
        if (w.startsWith('u')) {
            const uniPrefixes = ['uni', 'use', 'usu', 'unit', 'unique'];
            if (uniPrefixes.some(p => w.startsWith(p))) return 'y';
            return 'vowel';
        }
        if (VOWELS.includes(w[0])) return 'vowel';
        return w[0];
    };

    const isVowelSound = (s) => s === 'vowel';

    const checkLinking = (w1, w2) => {
        const lastChar = w1[w1.length - 1];
        if (STOP_PUNCS.includes(lastChar)) return false;
        const s1 = getEndingSound(w1);
        const s2 = getStartingSound(w2);
        if (!s1 || !s2) return false;
        if (!isVowelSound(s1) && isVowelSound(s2)) return true;
        if (isVowelSound(s1) && isVowelSound(s2)) return true;
        if (!isVowelSound(s1) && s1 === s2) return true;
        if (PLOSIVES.includes(s1) && (PLOSIVES.includes(s2) || FRICATIVES.includes(s2))) return true;
        if (['t', 'd', 's', 'z'].includes(s1) && (clean(w2).startsWith('y') || clean(w2).startsWith('you'))) return true;
        return false;
    };

    const getGroups = (sentence) => {
        const words = sentence.split(/\s+/).filter(Boolean);
        const groups = [];
        let i = 0;
        while (i < words.length) {
            let currentGroup = [words[i]];
            while (i + 1 < words.length && checkLinking(words[i], words[i+1])) {
                currentGroup.push(words[i+1]);
                i++;
            }
            groups.push({ words: currentGroup, isLinked: currentGroup.length > 1 });
            i++;
        }
        return groups;
    };

    const inputArea = document.getElementById('inputArea');
    const goBtn = document.getElementById('goBtn');
    const result = document.getElementById('result');
    const wordCountEl = document.getElementById('wordCount');
    const navHistoryEl = document.getElementById('navHistory');
    const prevHistoryBtn = document.getElementById('prevHistory');
    const nextHistoryBtn = document.getElementById('nextHistory');
    const historyTimeEl = document.getElementById('historyTime');
    const backToTopBtn = document.getElementById('backToTopBtn');
    const trashBtnLeft = document.getElementById('trashBtnLeft');
    const trashBtnRight = document.getElementById('trashBtnRight');
    const newWordsArea = document.getElementById('newWordsArea');
    const newWordsList = document.getElementById('newWordsList');
    const addWordBtn = document.getElementById('addWordBtn');
    const removeWordBtn = document.getElementById('removeWordBtn');

    let historyList = JSON.parse(localStorage.getItem('englishReaderHistory') || '[]');
    let historyIndex = parseInt(localStorage.getItem('englishReaderCurrentIndex') || '-1');
    let currentSelectedWord = '';
    let selectedVoice = null;
    let isAutoReading = false;
    let lastSwipedElement = null;
    let touchStartX = 0, touchStartY = 0;

    const fontSettings = document.getElementById('fontSettings');
    const resSizeSlider = document.getElementById('resSizeSlider');
    const wordSizeSlider = document.getElementById('wordSizeSlider');
    const fullSpeedSlider = document.getElementById('fullSpeedSlider');
    const indivSpeedSlider = document.getElementById('indivSpeedSlider');
    const resVal = document.getElementById('resVal');
    const wordVal = document.getElementById('wordVal');
    const fullSpeedVal = document.getElementById('fullSpeedVal');
    const indivSpeedVal = document.getElementById('indivSpeedVal');
    const hideSettings = document.getElementById('hideSettings');
    const titleEl = document.querySelector('.title');

    let fullTextSpeed = parseFloat(localStorage.getItem('readerFullSpeed') || '1.0');
    let individualSpeed = parseFloat(localStorage.getItem('readerIndivSpeed') || '1.0');

    function applyFontSize(type, size) {
        document.documentElement.style.setProperty(type === 'res' ? '--result-fs' : '--new-word-fs', size + 'px');
        localStorage.setItem(type === 'res' ? 'readerResSize' : 'readerWordSize', size);
        if(type === 'res') resVal.textContent = size; else wordVal.textContent = size;
    }

    function applyFullSpeed(speed) {
        fullTextSpeed = parseFloat(speed);
        localStorage.setItem('readerFullSpeed', speed);
        fullSpeedVal.textContent = speed;
    }

    function applyIndivSpeed(speed) {
        individualSpeed = parseFloat(speed);
        localStorage.setItem('readerIndivSpeed', speed);
        indivSpeedVal.textContent = speed;
    }

    resSizeSlider.oninput = (e) => applyFontSize('res', e.target.value);
    wordSizeSlider.oninput = (e) => applyFontSize('word', e.target.value);
    fullSpeedSlider.oninput = (e) => applyFullSpeed(e.target.value);
    indivSpeedSlider.oninput = (e) => applyIndivSpeed(e.target.value);
    hideSettings.onclick = () => fontSettings.style.display = 'none';

    let titleTouchX = 0;
    titleEl.addEventListener('touchstart', (e) => { titleTouchX = e.touches[0].clientX; }, {passive: true});
    titleEl.addEventListener('touchend', (e) => {
        const deltaX = e.changedTouches[0].clientX - titleTouchX;
        if (Math.abs(deltaX) > 40) fontSettings.style.display = fontSettings.style.display === 'block' ? 'none' : 'block';
    });

    const savedResSize = localStorage.getItem('readerResSize') || 22;
    const savedWordSize = localStorage.getItem('readerWordSize') || 22;
    applyFontSize('res', savedResSize); applyFontSize('word', savedWordSize);
    resSizeSlider.value = savedResSize; wordSizeSlider.value = savedWordSize;
    
    fullSpeedSlider.value = fullTextSpeed;
    fullSpeedVal.textContent = fullTextSpeed;
    indivSpeedSlider.value = individualSpeed;
    indivSpeedVal.textContent = individualSpeed;

    let wakeLock = null;
    async function requestWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
    document.addEventListener('visibilitychange', () => { if (wakeLock && document.visibilityState === 'visible') requestWakeLock(); });

    function save() {
        localStorage.setItem('englishReaderHistory', JSON.stringify(historyList));
        localStorage.setItem('englishReaderCurrentIndex', historyIndex);
    }

    function processText(text, isNew = true, savedData = null, shouldScroll = false) {
        if (!text) return;
        const sentences = splitSentences(text);
        const totalWords = text.split(/\s+/).filter(Boolean).length;
        const data = savedData || sentences.map(s => getGroups(s));
        
        render(sentences, data);
        wordCountEl.textContent = `Total Words: ${totalWords}`;

        if (isNew) {
            const record = { text, timestamp: Date.now(), newWords: [], data };
            historyList.push(record);
            if (historyList.length > 20) historyList.shift();
            historyIndex = historyList.length - 1;
            save();
        }
        updateHistoryNav();
        updateNewWords();
        
        if (shouldScroll) {
            result.scrollIntoView({ behavior: 'smooth' });
        }
    }

    function render(sentences, data) {
        result.innerHTML = '';
        sentences.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = 'sentence';
            div.innerHTML = `<div class="words-container" style="width:100%"></div>`;
            const container = div.querySelector('.words-container');
            const groups = data[idx] || [];
            groups.forEach(g => {
                if (g.isLinked) {
                    const span = document.createElement('span');
                    span.className = 'link-phonetic';
                    g.words.forEach((w, wIdx) => {
                        span.appendChild(createWordSpan(w));
                        if (wIdx < g.words.length - 1) span.appendChild(document.createTextNode(' '));
                    });
                    container.appendChild(span);
                } else { container.appendChild(createWordSpan(g.words[0])); }
                container.appendChild(document.createTextNode(' '));
            });
            div.onclick = (e) => { if (!e.target.classList.contains('word')) { isAutoReading = false; speak(s, div); } };
            result.appendChild(div);
        });
    }

    function createWordSpan(text) {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = text;
        span.onclick = (e) => { e.stopPropagation(); isAutoReading = false; speak(text, span); };
        return span;
    }

    function splitSentences(text) {
        return text.replace(/(\d):(\d)/g, '$1⏱$2').split(/(?<=[.!?])\s+/).map(s => s.replace(/⏱/g, ':').trim()).filter(Boolean);
    }

    function speak(text, el, onEndCallback = null) {
        window.speechSynthesis.cancel();
        document.querySelectorAll('.sentence, .word, .new-word-item, .link-phonetic').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if (el.classList.contains('sentence')) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const u = new SpeechSynthesisUtterance(text);
        u.voice = selectedVoice; 
        u.rate = isAutoReading ? fullTextSpeed : individualSpeed;
        u.onend = () => { el.classList.remove('active'); if (onEndCallback) onEndCallback(); };
        window.speechSynthesis.speak(u);
    }

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) return;
        selectedVoice = voices.find(v => v.name.includes('Samantha')) || voices.find(v => v.name.includes('Daniel')) || voices.find(v => v.lang.includes('en-US')) || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;

    goBtn.onclick = () => { 
        processText(inputArea.value.trim(), true, null, true); 
        inputArea.value = ''; inputArea.blur(); 
    };

    function updateHistoryNav() {
        navHistoryEl.style.display = historyList.length > 1 ? 'flex' : 'none';
        prevHistoryBtn.classList.toggle('disabled', historyIndex <= 0);
        nextHistoryBtn.classList.toggle('disabled', historyIndex >= historyList.length - 1);
        if (historyIndex >= 0) historyTimeEl.textContent = new Date(historyList[historyIndex].timestamp).toLocaleString();
    }

    prevHistoryBtn.onclick = () => {
        if (historyIndex > 0) {
            historyIndex--;
            const r = historyList[historyIndex];
            processText(r.text, false, r.data, false);
            save();
        }
    };
    nextHistoryBtn.onclick = () => {
        if (historyIndex < historyList.length - 1) {
            historyIndex++;
            const r = historyList[historyIndex];
            processText(r.text, false, r.data, false);
            save();
        }
    };

    document.addEventListener('selectionchange', () => {
        const s = window.getSelection().toString().trim();
        if (s && (result.contains(window.getSelection().anchorNode) || newWordsArea.contains(window.getSelection().anchorNode))) {
            currentSelectedWord = s;
            const isExist = historyIndex >= 0 && historyList[historyIndex].newWords?.includes(s);
            if (isExist) { removeWordBtn.classList.add('show'); addWordBtn.classList.remove('show'); }
            else { addWordBtn.classList.add('show'); removeWordBtn.classList.remove('show'); }
        } else { addWordBtn.classList.remove('show'); removeWordBtn.classList.remove('show'); }
    });

    addWordBtn.onclick = () => {
        if (historyIndex >= 0 && currentSelectedWord) {
            const r = historyList[historyIndex];
            if (!r.newWords) r.newWords = [];
            if (!r.newWords.includes(currentSelectedWord)) { r.newWords.push(currentSelectedWord); save(); updateNewWords(); }
            addWordBtn.classList.remove('show');
        }
    };

    removeWordBtn.onclick = () => {
        if (historyIndex >= 0 && currentSelectedWord) {
            const r = historyList[historyIndex];
            r.newWords = r.newWords.filter(w => w !== currentSelectedWord);
            save(); updateNewWords(); removeWordBtn.classList.remove('show');
        }
    };

    function updateNewWords() {
        if (historyIndex < 0) return;
        const words = historyList[historyIndex].newWords || [];
        newWordsArea.style.display = words.length > 0 ? 'block' : 'none';
        newWordsList.innerHTML = words.map(w => `<div class="new-word-item">${w}</div>`).join('');
        newWordsList.querySelectorAll('.new-word-item').forEach(el => {
            el.onclick = () => { isAutoReading = false; speak(el.textContent, el); }
        });
    }

    let lP = false, rP = false;
    const checkDel = () => {
        if (lP && rP) { historyList.splice(historyIndex, 1); historyIndex = historyList.length - 1; save(); location.reload(); }
    };
    trashBtnLeft.ontouchstart = (e) => { e.preventDefault(); lP = true; trashBtnLeft.classList.add('pressed'); checkDel(); };
    trashBtnRight.ontouchstart = (e) => { e.preventDefault(); rP = true; trashBtnRight.classList.add('pressed'); checkDel(); };
    trashBtnLeft.onmousedown = () => { lP = true; trashBtnLeft.classList.add('pressed'); checkDel(); };
    trashBtnRight.onmousedown = () => { rP = true; trashBtnRight.classList.add('pressed'); checkDel(); };
    trashBtnLeft.onmouseup = trashBtnLeft.onmouseleave = trashBtnLeft.ontouchend = () => { lP = false; trashBtnLeft.classList.remove('pressed'); };
    trashBtnRight.onmouseup = trashBtnRight.onmouseleave = trashBtnRight.ontouchend = () => { rP = false; trashBtnRight.classList.remove('pressed'); };

    window.onscroll = () => {
        const show = window.scrollY > 300;
        backToTopBtn.classList.toggle('show', show);
        const atBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 80;
        trashBtnLeft.classList.toggle('show', atBottom); trashBtnRight.classList.toggle('show', atBottom);
    };
    
    backToTopBtn.onclick = () => { window.scrollTo({ top: 0, behavior: 'smooth' }); };

    titleEl.onclick = (e) => {
        const deltaX = e.clientX - titleTouchX;
        if(Math.abs(deltaX) > 10) return;
        const sentenceNodes = document.querySelectorAll('.sentence');
        if (sentenceNodes.length === 0) return;
        isAutoReading = true; 
        let index = 0;
        function readNext() {
            if (!isAutoReading || index >= sentenceNodes.length) { isAutoReading = false; return; }
            const currentEl = sentenceNodes[index];
            const text = currentEl.querySelector('.words-container').textContent;
            speak(text, currentEl, () => { index++; readNext(); });
        }
        readNext();
    };

    result.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; lastSwipedElement = null; }, { passive: true });
    result.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const deltaX = Math.abs(touch.clientX - touchStartX);
        const deltaY = Math.abs(touch.clientY - touchStartY);
        if (deltaX > deltaY && deltaX > 10) {
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const linkedGroup = target?.closest('.link-phonetic');
            if (linkedGroup && linkedGroup !== lastSwipedElement) { 
                isAutoReading = false; 
                lastSwipedElement = linkedGroup; 
                speak(linkedGroup.textContent, linkedGroup); 
            }
        }
    }, { passive: true });
    result.addEventListener('touchend', () => { lastSwipedElement = null; });

    window.onload = () => {
        loadVoices(); requestWakeLock();
        if (historyIndex >= 0 && historyList[historyIndex]) {
            const r = historyList[historyIndex];
            processText(r.text, false, r.data, false);
        }
    };
</script>
</body>
</html>
