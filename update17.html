<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- 添加GitHub样式的favicon -->
<link rel="shortcut icon" href="https://github.githubassets.com/favicon.ico" type="image/x-icon">
<link rel="icon" href="https://github.githubassets.com/favicon.ico" type="image/x-icon">
<title>English Reader</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #f7f8fa;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  padding-bottom: 20px;
}

.title {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  color: #2c3e50;
  margin: 30px 0 20px;
  cursor: pointer;
}

#voiceSelect {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #fff;
  outline: none;
}

#inputArea {
  width: 100%;
  height: 180px;
  padding: 15px;
  font-size: 17px; /* 稍大一点的字号 */
  line-height: 1.5; /* 更好的行高 */
  border: 1px solid #ddd;
  border-radius: 12px;
  resize: vertical;
  outline: none;
  background: white;
  /* 确保placeholder正确显示 */
  color: #333;
}

/* 修复placeholder样式 */
#inputArea::placeholder {
  color: #888;
  opacity: 1; /* 确保placeholder不透明 */
  font-size: 16px;
}

#goBtn {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: 600;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 12px;
  margin: 12px 0 12px;
  cursor: pointer;
}

#wordCount {
  text-align: center;
  font-size: 16px;
  color: #666;
  margin-bottom: 10px;
  min-height: 24px;
}

#navHistory {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 25px;
  gap: 8px;
}

.history-arrows {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.history-arrow {
  font-size: 24px;
  cursor: pointer;
  color: #007aff;
  user-select: none;
  transition: opacity 0.2s;
}
.history-arrow:hover {
  opacity: 0.8;
}
.history-arrow.disabled {
  color: #007aff;
  opacity: 0.5;
  cursor: not-allowed;
}

#historyTime {
  font-size: 13px;
  color: #888;
  text-align: center;
  min-height: 20px;
}

#result {
  line-height: 1.8;
  font-size: 18px;
}

.sentence {
  display: flex;
  align-items: center;
  padding: 14px 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #fff;
  border: 1px solid #eee;
  transition: background 0.2s;
  cursor: pointer;
  user-select: none;
}

.sentence.active {
  background: #e1f5fe;
  border-color: #007aff;
}

.speaker {
  margin-right: 12px;
  font-size: 24px;
  user-select: none;
  flex-shrink: 0;
}

.word {
  display: inline-block;
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.word.active {
  background: #ffeb3b;
  font-weight: 500;
}

/* 生词收集区样式 */
#collectedWordsContainer {
  margin-top: 40px;
  border-top: 2px solid #eee;
  padding-top: 20px;
  display: none;
}

#collectedWordsContainer h3 {
  color: #2c3e50;
  margin-bottom: 15px;
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

#collectedWordsList {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 15px;
  min-height: 40px;
}

.word-tag {
  display: inline-flex;
  align-items: center;
  background: #e3f2fd;
  color: #1565c0;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  user-select: none;
  transition: all 0.2s;
  border: 1px solid #bbdefb;
}

.word-tag:hover {
  background: #bbdefb;
  transform: translateY(-2px);
}

.word-tag-remove {
  margin-left: 8px;
  cursor: pointer;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #1565c0;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  line-height: 1;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.word-tag-remove:hover {
  opacity: 1;
  background: #0d47a1;
}

#emptyWordsTip {
  color: #888;
  font-style: italic;
  padding: 20px;
  text-align: center;
  background: #f9f9f9;
  border-radius: 10px;
  border: 1px dashed #ddd;
}

/* 浮动添加按钮样式 */
#floatingAddWordBtn {
  position: fixed;
  width: 44px;
  height: 44px;
  background: #007aff;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  z-index: 10000;
  box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
  cursor: pointer;
  user-select: none;
  pointer-events: auto;
  transition: transform 0.2s, box-shadow 0.2s;
  animation: floatIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes floatIn {
  from {
    opacity: 0;
    transform: scale(0.5);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

#floatingAddWordBtn:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 25px rgba(0, 122, 255, 0.5);
}

#floatingAddWordBtn:active {
  transform: scale(0.95);
  box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
}

/* 单独定位的两个垃圾箱按钮 */
.trash-btn {
  position: fixed;
  bottom: 30px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #007aff;
  color: white;
  border: none;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
  transition: all 0.3s;
  user-select: none;
  z-index: 99;
  opacity: 0;
  visibility: hidden;
  transform: translateY(20px);
}

.trash-btn.show {
  opacity: 0.9;
  visibility: visible;
  transform: translateY(0);
}

.trash-btn:hover {
  opacity: 1;
  transform: translateY(0) scale(1.08);
  box-shadow: 0 6px 20px rgba(0, 122, 255, 0.5);
}

.trash-btn:active {
  transform: translateY(0) scale(0.95);
  box-shadow: 0 2px 10px rgba(0, 122, 255, 0.3);
}

.trash-btn.pressed {
  background: #ff3b30;
  box-shadow: 0 4px 15px rgba(255, 59, 48, 0.5);
}

/* 调整按钮位置，更靠里一些 */
#trashBtnLeft {
  left: 60px;
}

#trashBtnRight {
  right: 60px;
}

#backToTopBtn {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background-color: #007aff;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
  transition: all 0.3s;
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transform: translateX(-50%) translateY(20px);
}
#backToTopBtn.show {
  opacity: 0.9;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
}
#backToTopBtn:hover {
  opacity: 1;
  transform: translateX(-50%) scale(1.08);
  box-shadow: 0 6px 20px rgba(0, 122, 255, 0.5);
}

/* 在移动设备上调整按钮位置 */
@media (max-width: 768px) {
  .trash-btn {
    width: 55px;
    height: 55px;
    font-size: 24px;
    bottom: 25px;
  }
  
  #trashBtnLeft {
    left: 40px;
  }
  
  #trashBtnRight {
    right: 40px;
  }
  
  #inputArea {
    font-size: 16px; /* 在移动设备上使用稍小的字号 */
  }
  
  #floatingAddWordBtn {
    width: 40px;
    height: 40px;
    font-size: 20px;
  }
}

@media (max-width: 480px) {
  .trash-btn {
    width: 50px;
    height: 50px;
    font-size: 22px;
    bottom: 20px;
  }
  
  #trashBtnLeft {
    left: 30px;
  }
  
  #trashBtnRight {
    right: 30px;
  }
  
  #inputArea {
    font-size: 16px;
    height: 160px; /* 在非常小的屏幕上调整高度 */
  }
  
  #inputArea::placeholder {
    font-size: 15px; /* 在非常小的屏幕上调整placeholder字号 */
  }
  
  #floatingAddWordBtn {
    width: 36px;
    height: 36px;
    font-size: 18px;
  }
}
</style>
</head>

<body>
  <div class="title">English Reader</div>

  <select id="voiceSelect"></select>

  <textarea id="inputArea" placeholder="Paste your English text here..."></textarea>
  <button id="goBtn">Go</button>
  <div id="wordCount"></div>
  <div id="navHistory" style="display: none;">
    <div class="history-arrows">
      <span id="prevHistory" class="history-arrow">&#9664;&#xFE0E;</span>
      <span id="nextHistory" class="history-arrow">&#9654;&#xFE0E;</span>
    </div>
    <div id="historyTime"></div>
  </div>

  <div id="result"></div>

  <!-- 新增：生词收集区 -->
  <div id="collectedWordsContainer">
    <h3>📖 Collected Words</h3>
    <div id="collectedWordsList"></div>
    <div id="emptyWordsTip">No words collected yet. Long-press a word in the result to add it here.</div>
  </div>

  <!-- 垃圾箱按钮 -->
  <button id="trashBtnLeft" class="trash-btn" title="Hold this button and the right button to delete current record">🗑️</button>
  <button id="trashBtnRight" class="trash-btn" title="Hold this button and the left button to delete current record">🗑️</button>

  <button id="backToTopBtn" title="Back to result">↑</button>

<script>
const inputArea = document.getElementById('inputArea');
const goBtn = document.getElementById('goBtn');
const result = document.getElementById('result');
const voiceSelect = document.getElementById('voiceSelect');
const titleEl = document.querySelector('.title');
const wordCountEl = document.getElementById('wordCount');
const navHistoryEl = document.getElementById('navHistory');
const prevHistoryBtn = document.getElementById('prevHistory');
const nextHistoryBtn = document.getElementById('nextHistory');
const historyTimeEl = document.getElementById('historyTime');
const backToTopBtn = document.getElementById('backToTopBtn');
// 垃圾箱按钮
const trashBtnLeft = document.getElementById('trashBtnLeft');
const trashBtnRight = document.getElementById('trashBtnRight');
// 生词收集区元素
const collectedWordsContainer = document.getElementById('collectedWordsContainer');
const collectedWordsList = document.getElementById('collectedWordsList');
const emptyWordsTip = document.getElementById('emptyWordsTip');

let allVoices = [];
let currentUtterance = null;
// 历史记录相关变量
let historyIndex = -1;
let historyList = [];
// 存储键定义
const HISTORY_STORAGE_KEY = 'englishReaderHistory';
const CURRENT_INDEX_KEY = 'englishReaderCurrentIndex';

// 垃圾箱按钮的按下状态跟踪
let leftTrashPressed = false;
let rightTrashPressed = false;
let deleteInProgress = false;

// 长按相关变量
let longPressTimer = null;
let currentLongPressWord = null;
let currentLongPressWordText = '';

// 判断是否滚动到底部的函数
function isAtBottom() {
  const totalHeight = document.body.scrollHeight;
  const scrollPosition = window.scrollY + window.innerHeight;
  return scrollPosition >= totalHeight - 50;
}

// 更新按钮显示状态的函数
function updateButtonVisibility() {
  // 更新返回顶部按钮
  if (window.scrollY > 200) {
    backToTopBtn.classList.add('show');
  } else {
    backToTopBtn.classList.remove('show');
  }
  
  // 更新垃圾箱按钮：只在滚动到底部时显示
  if (isAtBottom()) {
    trashBtnLeft.classList.add('show');
    trashBtnRight.classList.add('show');
  } else {
    trashBtnLeft.classList.remove('show');
    trashBtnRight.classList.remove('show');
  }
}

// ————————— iPhone 防熄屏核心代码 —————————
let wakeLock = null;
async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log('屏幕已保持常亮');
  } catch (err) {
    console.log('无法保持常亮:', err);
  }
}
document.addEventListener('visibilitychange', () => {
  if (wakeLock && document.visibilityState === 'visible') {
    requestWakeLock();
  }
});
window.addEventListener('load', requestWakeLock);
// ————————— 防熄屏代码结束 —————————

// ==================== 生词收集功能 ====================

// 显示浮动添加按钮
function showAddWordButton(wordElement, wordText, touchEvent) {
  // 移除已存在的按钮
  const existingBtn = document.getElementById('floatingAddWordBtn');
  if (existingBtn) {
    existingBtn.remove();
  }

  // 创建浮动按钮
  const btn = document.createElement('div');
  btn.id = 'floatingAddWordBtn';
  btn.innerHTML = '+';
  btn.title = 'Add to Collection';
  
  // 计算按钮位置（避免被遮挡）
  const btnSize = 44;
  const margin = 10;
  let posX, posY;
  
  // 获取触摸/点击坐标
  const clientX = touchEvent.clientX || touchEvent.touches[0].clientX;
  const clientY = touchEvent.clientY || touchEvent.touches[0].clientY;
  
  // 默认位置：触摸点左上方
  posX = clientX - btnSize - margin;
  posY = clientY - btnSize - margin;
  
  // 边界检查：确保按钮在屏幕内
  const viewportWidth = window.innerWidth;
  const viewportHeight = window.innerHeight;
  
  // 如果太靠左，就放到右边
  if (posX < margin) posX = clientX + margin;
  // 如果太靠上，就放下边
  if (posY < margin) posY = clientY + margin;
  // 如果太靠右，调整到左边
  if (posX + btnSize > viewportWidth - margin) posX = clientX - btnSize - margin;
  // 如果太靠下，调整到上边
  if (posY + btnSize > viewportHeight - margin) posY = clientY - btnSize - margin;
  
  // 再次确保不超出边界
  posX = Math.max(margin, Math.min(posX, viewportWidth - btnSize - margin));
  posY = Math.max(margin, Math.min(posY, viewportHeight - btnSize - margin));
  
  btn.style.left = `${posX}px`;
  btn.style.top = `${posY}px`;

  document.body.appendChild(btn);

  // 绑定点击事件
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    e.preventDefault();
    addWordToCurrentCollection(wordText);
    removeFloatingButton();
  });

  // 设置自动隐藏
  setupAutoRemove(btn);
}

// 设置浮动按钮自动移除
function setupAutoRemove(button) {
  const removeButton = () => {
    if (button && button.parentNode) {
      button.remove();
    }
  };
  
  // 条件1: 触摸结束时立即移除
  document.addEventListener('touchend', removeButton, { once: true });
  // 条件2: 鼠标松开时移除（桌面端）
  document.addEventListener('mouseup', removeButton, { once: true });
  // 条件3: 页面滚动时立即移除
  window.addEventListener('scroll', removeButton, { once: true });
  // 条件4: 点击页面其他部分时移除
  document.addEventListener('touchstart', function removeOnOtherTouch(e) {
    if (e.target !== button && !button.contains(e.target)) {
      removeButton();
      document.removeEventListener('touchstart', removeOnOtherTouch);
    }
  });
  // 条件5: 2秒后自动移除
  setTimeout(removeButton, 2000);
}

// 移除浮动按钮
function removeFloatingButton() {
  const btn = document.getElementById('floatingAddWordBtn');
  if (btn && btn.parentNode) {
    btn.remove();
  }
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
}

// 为单词绑定长按事件
function bindWordEvents(wordElement) {
  const wordText = wordElement.textContent.trim();
  
  // 触摸事件（移动端）
  wordElement.addEventListener('touchstart', function(e) {
    e.stopPropagation();
    currentLongPressWord = this;
    currentLongPressWordText = wordText;
    
    longPressTimer = setTimeout(() => {
      showAddWordButton(this, wordText, e);
    }, 500); // 长按500ms后显示按钮
  });
  
  wordElement.addEventListener('touchend', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  });
  
  wordElement.addEventListener('touchmove', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
    removeFloatingButton();
  });
  
  // 鼠标事件（桌面端）
  wordElement.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return; // 只响应左键
    e.stopPropagation();
    currentLongPressWord = this;
    currentLongPressWordText = wordText;
    
    longPressTimer = setTimeout(() => {
      showAddWordButton(this, wordText, e);
    }, 500);
  });
  
  wordElement.addEventListener('mouseup', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  });
  
  wordElement.addEventListener('mouseleave', function() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  });
  
  // 阻止contextmenu事件对长按的影响
  wordElement.addEventListener('contextmenu', function(e) {
    // 不阻止默认行为，以保留系统菜单
    removeFloatingButton();
  });
}

// 添加单词到当前记录的生词本
function addWordToCurrentCollection(word) {
  if (!word || historyIndex === -1 || historyIndex >= historyList.length) {
    return;
  }
  
  const currentRecord = historyList[historyIndex];
  if (!currentRecord.collectedWords) {
    currentRecord.collectedWords = [];
  }
  
  // 检查是否已存在
  if (!currentRecord.collectedWords.includes(word)) {
    currentRecord.collectedWords.push(word);
    // 更新本地存储
    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(historyList));
    // 更新显示
    renderCollectedWords(currentRecord.collectedWords);
  }
}

// 从当前记录的生词本中移除单词
function removeWordFromCurrentCollection(word) {
  if (historyIndex === -1 || historyIndex >= historyList.length) {
    return;
  }
  
  const currentRecord = historyList[historyIndex];
  if (!currentRecord.collectedWords) {
    return;
  }
  
  const index = currentRecord.collectedWords.indexOf(word);
  if (index > -1) {
    currentRecord.collectedWords.splice(index, 1);
    // 更新本地存储
    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(historyList));
    // 更新显示
    renderCollectedWords(currentRecord.collectedWords);
  }
}

// 渲染生词列表
function renderCollectedWords(words) {
  if (!words || words.length === 0) {
    collectedWordsList.innerHTML = '';
    emptyWordsTip.style.display = 'block';
    collectedWordsContainer.style.display = 'none';
    return;
  }
  
  collectedWordsList.innerHTML = '';
  words.forEach(word => {
    const wordTag = document.createElement('div');
    wordTag.className = 'word-tag';
    wordTag.innerHTML = `
      ${word}
      <span class="word-tag-remove" data-word="${word}">×</span>
    `;
    
    // 添加删除功能
    const removeBtn = wordTag.querySelector('.word-tag-remove');
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeWordFromCurrentCollection(word);
    });
    
    // 点击单词本身可以发音
    wordTag.addEventListener('click', (e) => {
      if (!e.target.classList.contains('word-tag-remove')) {
        speakWord(word, wordTag);
      }
    });
    
    collectedWordsList.appendChild(wordTag);
  });
  
  emptyWordsTip.style.display = 'none';
  collectedWordsContainer.style.display = 'block';
}

// ==================== 历史记录功能 ====================

// 新增：保存当前状态（当前查看的索引）
function saveCurrentState() {
  localStorage.setItem(CURRENT_INDEX_KEY, historyIndex.toString());
}

// 页面加载时自动显示上一次的历史记录结果
function initPageWithLastResult() {
  loadHistoryFromStorage();
  
  // 如果有历史记录，显示保存的当前记录，但保持输入框为空
  if (historyList.length > 0 && historyIndex >= 0 && historyIndex < historyList.length) {
    const currentRecord = historyList[historyIndex];
    
    // 清空输入框（保持空白）
    inputArea.value = '';
    
    // 处理并显示当前记录的结果
    processText(currentRecord.text, false);
    
    // 显示生词列表
    if (currentRecord.collectedWords && currentRecord.collectedWords.length > 0) {
      renderCollectedWords(currentRecord.collectedWords);
    } else {
      collectedWordsContainer.style.display = 'none';
    }
    
    // 更新历史导航按钮状态
    updateHistoryNavButtons();
  } else if (historyList.length > 0 && historyIndex === -1) {
    // 如果没有保存的索引，但有历史记录，显示最后一条记录
    historyIndex = historyList.length - 1;
    const lastRecord = historyList[historyIndex];
    
    // 清空输入框（保持空白）
    inputArea.value = '';
    
    // 处理并显示最后一条记录的结果
    processText(lastRecord.text, false);
    
    // 显示生词列表
    if (lastRecord.collectedWords && lastRecord.collectedWords.length > 0) {
      renderCollectedWords(lastRecord.collectedWords);
    } else {
      collectedWordsContainer.style.display = 'none';
    }
    
    // 更新历史导航按钮状态
    updateHistoryNavButtons();
    
    // 保存当前状态
    saveCurrentState();
  }
}

// 处理同时按住两个垃圾箱按钮的逻辑
function setupTrashButtons() {
  // 鼠标按下事件
  trashBtnLeft.addEventListener('mousedown', () => {
    leftTrashPressed = true;
    trashBtnLeft.classList.add('pressed');
    checkBothTrashPressed();
  });
  
  trashBtnRight.addEventListener('mousedown', () => {
    rightTrashPressed = true;
    trashBtnRight.classList.add('pressed');
    checkBothTrashPressed();
  });
  
  // 鼠标松开/离开事件
  const clearTrashPress = () => {
    leftTrashPressed = false;
    rightTrashPressed = false;
    trashBtnLeft.classList.remove('pressed');
    trashBtnRight.classList.remove('pressed');
  };
  
  trashBtnLeft.addEventListener('mouseup', clearTrashPress);
  trashBtnLeft.addEventListener('mouseleave', clearTrashPress);
  trashBtnRight.addEventListener('mouseup', clearTrashPress);
  trashBtnRight.addEventListener('mouseleave', clearTrashPress);
  
  // 触摸事件支持（移动端）
  trashBtnLeft.addEventListener('touchstart', (e) => {
    e.preventDefault();
    leftTrashPressed = true;
    trashBtnLeft.classList.add('pressed');
    checkBothTrashPressed();
  });
  
  trashBtnRight.addEventListener('touchstart', (e) => {
    e.preventDefault();
    rightTrashPressed = true;
    trashBtnRight.classList.add('pressed');
    checkBothTrashPressed();
  });
  
  trashBtnLeft.addEventListener('touchend', clearTrashPress);
  trashBtnRight.addEventListener('touchend', clearTrashPress);
  trashBtnLeft.addEventListener('touchcancel', clearTrashPress);
  trashBtnRight.addEventListener('touchcancel', clearTrashPress);
}

// 检查是否两个按钮都被按下
function checkBothTrashPressed() {
  // 如果已经在执行删除操作，或者两个按钮没有同时按下，则返回
  if (deleteInProgress || !leftTrashPressed || !rightTrashPressed) {
    return;
  }
  
  // 防止重复触发
  deleteInProgress = true;
  
  // 检查是否有历史记录可删除
  if (historyList.length === 0 || historyIndex === -1) {
    deleteInProgress = false;
    clearTrashPressStates();
    return;
  }
  
  // 执行删除操作
  deleteCurrentRecord();
}

// 清除按钮按下状态
function clearTrashPressStates() {
  leftTrashPressed = false;
  rightTrashPressed = false;
  trashBtnLeft.classList.remove('pressed');
  trashBtnRight.classList.remove('pressed');
  setTimeout(() => {
    deleteInProgress = false;
  }, 300);
}

// 删除当前记录并导航
function deleteCurrentRecord() {
  if (historyList.length === 0 || historyIndex === -1) {
    clearTrashPressStates();
    return;
  }
  
  // 保存当前索引和列表长度
  const currentIdx = historyIndex;
  const totalRecords = historyList.length;
  
  // 从历史记录中删除当前条目
  historyList.splice(currentIdx, 1);
  
  // 更新本地存储
  localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(historyList));
  
  // 确定要导航到的下一个索引
  let newIndex = -1;
  
  if (historyList.length === 0) {
    // 如果没有记录了，清空界面
    newIndex = -1;
    inputArea.value = '';
    result.innerHTML = '';
    wordCountEl.textContent = '';
    historyTimeEl.textContent = '';
    navHistoryEl.style.display = 'none';
    collectedWordsContainer.style.display = 'none';
  } else {
    // 尝试跳转到下一条记录
    if (currentIdx < historyList.length) {
      newIndex = currentIdx; // 删除后，同位置的元素已经是下一条记录
    } else {
      // 如果删除的是最后一条，则跳转到上一条
      newIndex = historyList.length - 1;
    }
    
    // 导航到新记录
    historyIndex = newIndex;
    const record = historyList[newIndex];
    // 保持输入框为空，不显示历史记录文本
    inputArea.value = '';
    processText(record.text, false);
    
    // 显示生词列表
    if (record.collectedWords && record.collectedWords.length > 0) {
      renderCollectedWords(record.collectedWords);
    } else {
      collectedWordsContainer.style.display = 'none';
    }
  }
  
  // 保存当前状态
  saveCurrentState();
  
  // 滚动到结果区域
  setTimeout(() => {
    scrollToResult();
    clearTrashPressStates();
  }, 100);
}

function formatDateTime(timestamp) {
  const date = new Date(timestamp);
  const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                  'July', 'August', 'September', 'October', 'November', 'December'];
  
  const dayName = days[date.getDay()];
  const monthName = months[date.getMonth()];
  const day = date.getDate();
  const year = date.getFullYear();
  const hours = date.getHours().toString().padStart(2, '0');
  const minutes = date.getMinutes().toString().padStart(2, '0');
  const seconds = date.getSeconds().toString().padStart(2, '0');
  
  return `${dayName}, ${monthName} ${day}, ${year}, ${hours}:${minutes}:${seconds}`;
}

function loadHistoryFromStorage() {
  const stored = localStorage.getItem(HISTORY_STORAGE_KEY);
  if (stored) {
    try {
      historyList = JSON.parse(stored);
      // 尝试加载保存的当前索引
      const savedIndex = localStorage.getItem(CURRENT_INDEX_KEY);
      if (savedIndex !== null && savedIndex !== undefined) {
        const parsedIndex = parseInt(savedIndex, 10);
        // 确保索引在有效范围内
        if (parsedIndex >= 0 && parsedIndex < historyList.length) {
          historyIndex = parsedIndex;
        } else {
          // 如果保存的索引无效，则指向最后一条记录
          historyIndex = historyList.length - 1;
        }
      } else {
        // 如果没有保存的索引，则指向最后一条记录
        historyIndex = historyList.length - 1;
      }
    } catch (e) {
      console.error('读取历史记录失败:', e);
      historyList = [];
      historyIndex = -1;
    }
  }
}

function saveToHistory(text, count) {
  const newRecord = { 
    text: text, 
    wordCount: count, 
    timestamp: Date.now(),
    collectedWords: [] // 初始化为空数组
  };
  
  // 如果和最后一条记录内容相同，则不重复保存
  if (historyList.length > 0 && historyList[historyList.length - 1].text === text) {
    return;
  }
  
  historyList.push(newRecord);
  // 限制历史记录条数为10条
  if (historyList.length > 10) {
    historyList.shift(); // 移除最旧的一条
  }
  // 新增记录时，将索引指向最新记录
  historyIndex = historyList.length - 1;
  localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(historyList));
  // 保存当前状态
  saveCurrentState();
  updateHistoryNavButtons(); // 更新导航按钮状态
}

function updateHistoryNavButtons() {
  // 更新箭头按钮状态
  prevHistoryBtn.classList.toggle('disabled', historyIndex <= 0);
  nextHistoryBtn.classList.toggle('disabled', historyIndex >= historyList.length - 1);
  
  // 更新时间显示
  if (historyIndex >= 0 && historyIndex < historyList.length) {
    const currentRecord = historyList[historyIndex];
    historyTimeEl.textContent = formatDateTime(currentRecord.timestamp);
  } else {
    historyTimeEl.textContent = '';
  }
  
  // 如果没有历史记录，隐藏导航区域
  navHistoryEl.style.display = historyList.length > 1 ? 'flex' : 'none';
}

function processText(text, isNewRecord = true) {
  if (!text) return;

  const sentences = splitIntoRealSentences(text);
  const totalWords = sentences.reduce((sum, seg) => sum + seg.split(/\s+/).filter(Boolean).length, 0); // 计算单词总数

  // 渲染结果
  renderResult(sentences);

  // 显示单词数量
  wordCountEl.textContent = `Total Words: ${totalWords}`;

  // 如果是新的输入，才保存到历史记录
  if (isNewRecord) {
    saveToHistory(text, totalWords);
  }

  // 显示当前记录的生词列表
  if (historyIndex >= 0 && historyIndex < historyList.length) {
    const currentRecord = historyList[historyIndex];
    if (currentRecord.collectedWords && currentRecord.collectedWords.length > 0) {
      renderCollectedWords(currentRecord.collectedWords);
    } else {
      collectedWordsContainer.style.display = 'none';
    }
  } else {
    collectedWordsContainer.style.display = 'none';
  }

  // 滚动到结果区域
  scrollToResult();
}

function navigateHistory(direction) {
  if (direction === 'prev' && historyIndex > 0) {
    historyIndex--;
  } else if (direction === 'next' && historyIndex < historyList.length - 1) {
    historyIndex++;
  } else {
    return; // 无法导航时直接返回，不循环
  }
  
  const record = historyList[historyIndex];
  // 保持输入框为空，不显示历史记录文本
  inputArea.value = '';
  
  // 使用抽离的核心处理方法，跳过"保存到历史记录"这一步
  processText(record.text, false);
  updateHistoryNavButtons();
  // 保存当前状态
  saveCurrentState();
}

function scrollToResult() {
  result.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 滚动事件监听
window.addEventListener('scroll', updateButtonVisibility);

// 初始化页面
function initializePage() {
  // 初始化垃圾箱按钮
  setupTrashButtons();
  // 加载语音
  loadVoices();
  // 加载历史记录并显示保存的当前记录（输入框保持空白）
  initPageWithLastResult();
  // 初始检查按钮显示状态
  updateButtonVisibility();
}

// 页面加载完成后初始化
window.addEventListener('load', initializePage);

function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';
  allVoices.forEach((voice, i) => {
    if (voice.lang.includes('en')) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = `${voice.name} (${voice.lang})`;
      voiceSelect.appendChild(option);
    }
  });
  // 默认语音改为 Daniel
  const danielIndex = allVoices.findIndex(v =>
    v.name.includes('Daniel') && v.lang.includes('en')
  );
  if (danielIndex !== -1) {
    voiceSelect.value = danielIndex;
  } else {
    // 如果找不到Daniel，回退到原来的Samantha逻辑
    const samanthaIndex = allVoices.findIndex(v =>
      v.name.includes('Samantha') && v.lang.includes('en-US')
    );
    if (samanthaIndex !== -1) {
      voiceSelect.value = samanthaIndex;
    }
  }
}

function getSelectedVoice() {
  return allVoices[voiceSelect.value] || allVoices.find(v => v.lang.includes('en-US'));
}

window.speechSynthesis.onvoiceschanged = loadVoices;

// 修改了Go按钮的事件处理，添加了清空输入框的功能
goBtn.addEventListener('click', () => {
  const text = inputArea.value.trim();
  if (text) {
    processText(text, true);
    inputArea.value = ''; // 处理完成后清空输入框
  }
});

prevHistoryBtn.addEventListener('click', () => {
  navigateHistory('prev');
});
nextHistoryBtn.addEventListener('click', () => {
  navigateHistory('next');
});

backToTopBtn.addEventListener('click', scrollToResult);

function splitIntoRealSentences(text) {
  const s = text.replace(/\s+/g, ' ').trim();

  // 1. 保护 时间 12:30 3:30 这类冒号
  let t = s.replace(/(\d):(\d)/g, '$1⏱$2');

  // 2. 保护内部点：U.S.A. a.m. p.m. Mr. Dr. Jan. Feb. 等
  const protectPatterns = [
    /\b([A-Z])\.([A-Z])\.([A-Z])\./gi,
    /\b([A-Z])\.([A-Z])\./gi,
    /\b[a-z]\.[a-z]\./gi,
    /\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\./gi
  ];
  protectPatterns.forEach(re => {
    t = t.replace(re, m => m.replace(/\./g, '•'));
  });

  // 3. 只在 句末 . ! ? + 空格/结尾 处拆分
  const parts = t.split(/(?<=[.!?])\s+/);

  // 4. 还原符号
  return parts.map(p =>
    p.replace(/⏱/g, ':').replace(/•/g, '.').trim()
  ).filter(Boolean);
}

// 修改标题点击事件：改为朗读结果区的内容
titleEl.addEventListener('click', () => {
  // 从结果区获取所有句子文本
  const sentenceElements = document.querySelectorAll('#result .sentence');
  if (sentenceElements.length === 0) return;
  
  // 提取每个句子的文本内容
  const sentences = Array.from(sentenceElements).map(sentenceEl => {
    // 获取句子div中的第二个子元素（包含单词的部分）
    const wordsDiv = sentenceEl.children[1];
    return wordsDiv.textContent.trim();
  });
  
  // 将句子拼接成完整文本
  const fullText = sentences.join(' ');
  if (!fullText) return;
  
  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));
  const u = new SpeechSynthesisUtterance(fullText);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
  currentUtterance = u;
});

function renderResult(segments) {
  result.innerHTML = '';
  segments.forEach(seg => {
    const sentenceDiv = document.createElement('div');
    sentenceDiv.className = 'sentence';

    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = '🔊';

    const wordsDiv = document.createElement('div');
    wordsDiv.style.width = '100%';

    const words = seg.split(/\s+/).filter(Boolean);
    words.forEach(word => {
      const w = document.createElement('span');
      w.className = 'word';
      w.textContent = word;
      w.onclick = (e) => {
        e.stopPropagation();
        speakWord(word, w);
      };
      // 新增：绑定长按事件以显示浮动添加按钮
      bindWordEvents(w);
      wordsDiv.appendChild(w);
      wordsDiv.appendChild(document.createTextNode(' '));
    });

    sentenceDiv.appendChild(speaker);
    sentenceDiv.appendChild(wordsDiv);
    
    // 单击空白处或喇叭，打断并朗读
    sentenceDiv.addEventListener('click', (e) => {
      if (e.target.classList.contains('word')) return;
      speakSentence(seg, sentenceDiv);
    });

    // 双击空白处或喇叭，打断并重新朗读
    sentenceDiv.addEventListener('dblclick', (e) => {
      if (e.target.classList.contains('word')) return;
      // 清除双击可能造成的文本选中高亮，让体验更佳
      window.getSelection().removeAllRanges();
      speakSentence(seg, sentenceDiv);
    });
    
    result.appendChild(sentenceDiv);
  });
  // 渲染完成后，更新历史导航按钮状态
  updateHistoryNavButtons();
}

function speakSentence(text, sentenceEl) {
  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate = 0.96;
  u.pitch = 1.0;
  sentenceEl.classList.add('active');
  u.onend = () => sentenceEl.classList.remove('active');
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

function speakWord(word, wordEl) {
  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));
  wordEl.classList.add('active');
  const u = new SpeechSynthesisUtterance(word);
  u.voice = getSelectedVoice();
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

// 修复的stopSpeaking函数：确保重置currentUtterance
function stopSpeaking() {
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    currentUtterance = null; // 重置当前话语，避免状态冲突
  }
}
