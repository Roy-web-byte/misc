<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
        }
        
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1a56db;
            margin-bottom: 8px;
            cursor: pointer;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        h1:hover {
            background-color: rgba(26, 86, 219, 0.08);
        }
        
        .input-section {
            background-color: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        textarea {
            width: 100%;
            height: 150px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            padding: 18px;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.2s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #1a56db;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }
        
        .go-btn {
            background-color: #1a56db;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 120px;
        }
        
        .go-btn:hover {
            background-color: #1546b8;
        }
        
        .go-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .stats {
            text-align: center;
            color: #86868b;
            font-size: 1rem;
            margin-top: 10px;
        }
        
        .output-section {
            background-color: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        .sentences-container {
            margin-top: 20px;
        }
        
        .sentence-item {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #f0f0f0;
            transition: all 0.2s;
            position: relative;
        }
        
        .sentence-item.highlighted {
            background-color: rgba(26, 86, 219, 0.05);
            border-color: rgba(26, 86, 219, 0.2);
        }
        
        .sentence-item.looping {
            background-color: rgba(255, 149, 0, 0.1);
            border-color: rgba(255, 149, 0, 0.3);
        }
        
        .sentence-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .sentence-number {
            background-color: #f5f5f7;
            color: #86868b;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: 12px;
        }
        
        .speaker-icon {
            color: #1a56db;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .speaker-icon:hover {
            background-color: rgba(26, 86, 219, 0.1);
        }
        
        .sentence-text {
            font-size: 1.3rem;
            line-height: 1.7;
            margin-bottom: 5px;
            cursor: pointer;
            padding: 5px 0;
        }
        
        /* 修改点1：将单词和音标分离为独立区块，不再用容器包裹 */
        .word-block {
            display: inline-block;
            margin-right: 8px;
            vertical-align: top;
        }
        
        .word {
            display: inline-block;
            font-size: 1.3rem;
            padding: 4px 6px;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .word:hover, .word.highlighted {
            background-color: rgba(26, 86, 219, 0.08);
        }
        
        .ipa {
            display: block;
            color: #1a56db;
            font-size: 0.85rem;
            font-family: 'Arial', sans-serif;
            min-height: 1.2em;
            padding: 2px 6px 4px 6px;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            user-select: text; /* 确保音标可以被单独选择 */
        }
        
        .ipa:hover, .ipa.highlighted {
            background-color: rgba(26, 86, 219, 0.05);
        }
        
        .no-ipa-block {
            display: inline-block;
            font-size: 1.3rem;
            margin-right: 8px;
            padding: 4px 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .no-ipa-block:hover, .no-ipa-block.highlighted {
            background-color: rgba(26, 86, 219, 0.08);
        }
        
        .chinese-text {
            color: #1d1d1f;
            font-size: 1.3rem;
            display: inline-block;
            margin-right: 8px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #86868b;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #1a56db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #f0f0f0;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background-color: #1a56db;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .history-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }
        
        .history-btn {
            background-color: #1a56db;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(26, 86, 219, 0.3);
        }
        
        .history-btn:hover {
            background-color: #1546b8;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(26, 86, 219, 0.4);
        }
        
        .history-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .history-info {
            text-align: center;
            color: #86868b;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .input-section, .output-section {
                padding: 20px;
            }
            
            .sentence-text {
                font-size: 1.2rem;
            }
            
            .go-btn {
                width: 100px;
                padding: 12px 20px;
            }
            
            .history-btn {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
        }
        
        /* 高亮动画 */
        .highlighted-word {
            animation: highlightWord 0.5s ease;
        }
        
        @keyframes highlightWord {
            0% { background-color: rgba(26, 86, 219, 0); }
            50% { background-color: rgba(26, 86, 219, 0.2); }
            100% { background-color: rgba(26, 86, 219, 0.1); }
        }
    </style>
</head>

            </div>
            <div class="stats" id="stats">0 单词</div>
        </section>
        
        <section class="output-section">

            <div class="sentences-container" id="sentencesContainer">

                <button class="history-btn" id="nextBtn" title="后一个结果">

            </div>
            <div class="history-info" id="historyInfo">无历史记录</div>
        </section>
    </div>

        // 初始化函数
        function init() {
            // 获取DOM元素
            const textInput = document.getElementById('textInput');
            const processBtn = document.getElementById('processBtn');
            const title = document.getElementById('title');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            // 事件监听器
            processBtn.addEventListener('click', processText);
            prevBtn.addEventListener('click', showPreviousResult);
            nextBtn.addEventListener('click', showNextResult);
            
            // 语音合成初始化
            initSpeechSynthesis();
            
            // 点击标题事件
            title.addEventListener('click', () => {
                playAllSentences();
                toggleWakeLock();
            });
            
            // 点击外部时停止循环朗读
            document.addEventListener('click', (e) => {
                if (isLooping && !e.target.closest('.sentence-item')) {
                    stopLooping();
                }
            });
            
            // 页面加载时尝试恢复历史记录
            loadHistoryFromStorage();
            updateHistoryControls();
        }
        
        // 加载历史记录
        function loadHistoryFromStorage() {
            try {
                const savedHistory = localStorage.getItem('englishReader_history');
                if (savedHistory) {
                    history = JSON.parse(savedHistory);
                    // 确保history是数组
                    if (!Array.isArray(history)) {
                        history = [];
                    }
                }
                
                const savedIndex = localStorage.getItem('englishReader_history_index');
                if (savedIndex !== null) {
                    currentHistoryIndex = parseInt(savedIndex);
                }
                
                // 如果有历史记录，显示最新的
                if (history.length > 0 && currentHistoryIndex >= 0 && currentHistoryIndex < history.length) {
                    restoreHistoryResult(currentHistoryIndex);
                }
            } catch (e) {
                console.warn('加载历史记录失败:', e);
                history = [];
                currentHistoryIndex = -1;
            }
        }
        
        // 保存历史记录
        function saveHistoryToStorage() {
            try {
                localStorage.setItem('englishReader_history', JSON.stringify(history));
                localStorage.setItem('englishReader_history_index', currentHistoryIndex.toString());
            } catch (e) {
                console.warn('保存历史记录失败:', e);
            }
        }

        // 获取首选语音（优先Samantha，然后英式英语，然后美式英语）
        function getPreferredVoice(voices) {
            // 首选Samantha

        // 批量获取音标
        async function batchFetchIpa(words, progressCallback) {
            const ipaResults = {};
            const total = words.length;
            let processed = 0;
            
            // 从localStorage加载缓存
            const cachedIpa = JSON.parse(localStorage.getItem('ipaCache') || '{}');
            
            // 批量处理，每次处理5个单词
            const batchSize = 5;
            
            for (let i = 0; i < words.length; i += batchSize) {
                const batch = words.slice(i, i + batchSize);
                const promises = batch.map(async (word) => {
                    // 检查缓存
                    if (cachedIpa[word]) {
                        ipaResults[word] = cachedIpa[word];
                        return;
                    }
                    
                    // 检查常用单词
                    if (commonWordsIpa[word]) {
                        ipaResults[word] = commonWordsIpa[word];
                        return;
                    }
                    
                    // 从API获取
                    try {
                        const ipa = await fetchIpaFromAPI(word);
                        if (ipa) {
                            ipaResults[word] = ipa;
                            // 更新缓存
                            cachedIpa[word] = ipa;
                        } else {
                            // API没有返回，使用改进的占位符
                            ipaResults[word] = generateBetterFallbackIpa(word);
                        }
                    } catch (error) {
                        console.warn(`无法获取单词 "${word}" 的音标:`, error);
                        // API请求失败，使用改进的占位符
                        ipaResults[word] = generateBetterFallbackIpa(word);
                    }
                });
                
                await Promise.all(promises);
                
                // 更新进度
                processed += batch.length;
                if (progressCallback) {
                    progressCallback({ processed, total });
                }
                
                // 短暂延迟，避免请求过快
                if (i + batchSize < words.length) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }
            
            // 保存缓存到localStorage
            if (Object.keys(cachedIpa).length > 0) {
                try {
                    localStorage.setItem('ipaCache', JSON.stringify(cachedIpa));
                } catch (e) {
                    console.warn('无法保存音标缓存到localStorage:', e);
                }
            }
            
            return ipaResults;
        }
        
        // 从API获取音标
        async function fetchIpaFromAPI(word) {
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data && data[0] && data[0].phonetics && data[0].phonetics.length > 0) {
                        // 查找最可用的音标
                        let ipa = '';
                        
                        for (const phonetic of data[0].phonetics) {
                            if (phonetic.text) {
                                ipa = phonetic.text;
                                // 清理音标格式，移除首尾的 `/`
                                ipa = ipa.replace(/^\//, '').replace(/\/$/, '');
                                // 如果找到了音标文本，就使用它
                                break;
                            }
                        }
                        
                        // 如果找到了有效的IPA音标，返回它
                        if (ipa && ipa.includes('/')) {
                            return `/${ipa}/`;
                        } else if (ipa) {
                            // 如果返回的文本不是标准IPA格式，也返回它
                            return `/${ipa}/`;
                        }
                    }
                }
            } catch (error) {
                console.warn(`API请求失败 "${word}":`, error);
            }
            
            return null;
        }
        
        // 修改点2：改进的简单音标生成函数
        // 不再生成错误的音标，而是提供一个明确的占位符
        function generateBetterFallbackIpa(word) {
            // 对于短单词，直接返回占位符
            if (word.length <= 3) {
                return '/?/'; // 使用问号表示未知
            }
            
            // 对于长单词，可以根据常见模式提供一个粗略的占位符
            // 但这只是一个占位符，提醒用户API没有返回数据
            return '/***/';
        }
        
        // 提取句子中的单词
        function extractWordsFromSentence(sentence) {
            const wordRegex = /([\w'’@.-]+)/g;
            const tokens = sentence.match(wordRegex) || [];
            return tokens.filter(token => !/^[.,;:!?]+$/.test(token));
        }
        
        // 检查是否应该跳过音标
        function shouldSkipIpa(word) {
            if (/^\d+$/.test(word) || 
                /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(word) ||
                /^[A-Za-z]+:\/\/.+/.test(word) ||
                /^\d+\.\d+$/.test(word) ||
                /^[A-Z]\.$/.test(word) ||
                abbreviations.has(word)) {
                return true;
            }
            return false;
        }
        
        // 精确断句函数
        function splitIntoSentences(text) {
            if (!text.trim()) return [];
            
            // 改进的断句逻辑
            const sentences = [];
            let currentSentence = '';
            let i = 0;
            
            while (i < text.length) {
                currentSentence += text[i];
                
                // 检查当前字符是否是可能的句子结束符
                if (/[.!?。？！]/.test(text[i])) {
                    // 检查是否真的是句子结束（不是缩写的一部分）
                    if (isRealSentenceEnd(text, i)) {
                        // 检查是否有右引号跟随
                        if (i + 1 < text.length && /['"”]/.test(text[i + 1])) {
                            currentSentence += text[i + 1];
                            i++;
                        }
                        
                        sentences.push(currentSentence.trim());
                        currentSentence = '';
                    }
                }
                
                i++;
            }
            
            // 添加最后一个句子（如果有）
            if (currentSentence.trim()) {
                sentences.push(currentSentence.trim());
            }
            
            return sentences.filter(s => s.length > 0);
        }
        
        // 检查是否真的是句子结束（不是缩写的一部分）
        function isRealSentenceEnd(text, index) {
            const char = text[index];
            
            // 如果不是句子结束符，直接返回false
            if (!/[.!?。？！]/.test(char)) {
                return false;
            }
            
            // 检查下一个字符是否是空格或结束
            if (index === text.length - 1) {
                return true;
            }
            
            const nextChar = text[index + 1];
            if (/\s/.test(nextChar)) {
                // 检查是否是缩写
                return !isAbbreviation(text, index);
            }
            
            // 检查是否有右引号跟随
            if (['"', "'", '”'].includes(nextChar)) {
                if (index + 2 >= text.length || /\s/.test(text[index + 2])) {
                    return !isAbbreviation(text, index);
                }
            }
            
            return false;
        }
        
        // 检查是否是缩写
        function isAbbreviation(text, dotIndex) {
            // 向前查找单词的开始
            let start = dotIndex;
            while (start > 0 && /[\w.]/.test(text[start - 1])) {
                start--;
            }
            
            // 获取可能的缩写
            const possibleAbbr = text.substring(start, dotIndex + 1);
            
            // 检查是否匹配已知缩写
            if (abbreviations.has(possibleAbbr)) {
                return true;
            }
            
            // 检查是否是单个大写字母加句点（如 "A.", "B." 等）
            if (possibleAbbr.length === 2 && /[A-Z]\./.test(possibleAbbr)) {
                return true;
            }
            
            // 检查是否是数字加句点（如 "1.", "2." 等）
            if (possibleAbbr.length === 2 && /\d\./.test(possibleAbbr)) {
                return true;
            }
            
            // 检查是否是网址或电子邮件的一部分
            if (start > 0) {
                const beforeAbbr = text.substring(Math.max(0, start - 5), start);
                if (beforeAbbr.includes('@') || beforeAbbr.includes('www') || beforeAbbr.includes('http')) {
                    return true;
                }
            }
            
            return false;
        }

        // 修改点1 & 2 结合：分割句子为单词并添加音标
        function splitSentenceIntoWordsWithIpa(sentence, ipaResults, wordMap) {
            // 使用正则表达式分割单词，保留标点符号
            const wordRegex = /([\w'’@.-]+|[^\w\s])/g;
            const tokens = sentence.match(wordRegex) || [];
            
            let result = '';
            
            for (const token of tokens) {
                // 检查是否是单词（包含字母、数字、常见符号）
                if (/[\w'’@.-]/.test(token) && !/^[.,;:!?]+$/.test(token)) {
                    // 检查是否是纯数字、邮箱、URL等不需要音标的内容
                    if (shouldSkipIpa(token)) {
                        // 不需要音标的单词，用独立的块包裹
                        result += `<span class="no-ipa-block" data-word="${token}">${token}</span>`;
                    } else {
                        // 获取音标
                        const cleanWord = token.toLowerCase().replace(/[''']/g, '');
                        let ipa = '';
                        
                        // 从结果中查找音标
                        if (ipaResults[cleanWord]) {
                            ipa = ipaResults[cleanWord];
                        } else if (commonWordsIpa[cleanWord]) {
                            ipa = commonWordsIpa[cleanWord];
                        } else {
                            // 如果没有找到，使用改进的占位符
                            ipa = generateBetterFallbackIpa(cleanWord);
                        }
                        
                        // 创建独立的单词和音标块
                        result += `<span class="word-block">`;
                        result += `<span class="word" data-word="${token}">${token}</span>`;
                        
                        if (ipa) {
                            result += `<span class="ipa" data-word="${token}">${ipa}</span>`;
                        } else {
                            result += `<span class="ipa" data-word="${token}"></span>`;
                        }
                        
                        result += `</span>`;
                    }
                } else if (/[\u4e00-\u9fa5]/.test(token)) {
                    // 中文，不加音标
                    result += `<span class="chinese-text">${token}</span>`;
                } else {
                    // 标点符号或其他
                    result += `<span>${token}</span>`;
                }
                
                // 添加空格（除非是中文标点或右括号等）
                if (!/[。？！，；：、”')]/.test(token)) {
                    result += ' ';
                }
            }
            
            return result;
        }
        
        // 朗读句子
        function speakSentence(sentence, sentenceElement = null) {
            if (!speechSynthesis) {
                alert('您的浏览器不支持语音合成功能');
                return;
            }
            
            // 停止当前语音
            speechSynthesis.cancel();
            
            // 高亮句子
            if (sentenceElement) {
                document.querySelectorAll('.sentence-item').forEach(item => {
                    item.classList.remove('highlighted');
                });
                sentenceElement.classList.add('highlighted');
                
                // 5秒后移除高亮
                setTimeout(() => {
                    sentenceElement.classList.remove('highlighted');
                }, 5000);
            }
            
            // 创建语音
            const utterance = new SpeechSynthesisUtterance(sentence);
            
            // 设置语音
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }
            
            // 设置语音参数
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            
            // 开始朗读
            speechSynthesis.speak(utterance);
        }
        
        // 开始循环朗读
        function startLooping(sentence, sentenceElement) {
            if (isLooping) {
                stopLooping();
            }
            
            isLooping = true;
            loopingSentence = sentenceElement;
            sentenceElement.classList.add('looping');
            
            // 创建循环函数
            const loopSpeak = () => {
                if (!isLooping) return;
                
                speakSentence(sentence, sentenceElement);
                
                // 语音结束后再次触发
                const utterance = new SpeechSynthesisUtterance(sentence);
                if (selectedVoice) utterance.voice = selectedVoice;
                
                utterance.onend = () => {
                    if (isLooping) {
                        setTimeout(loopSpeak, 500);
                    }
                };
                
                speechSynthesis.speak(utterance);
            };
            
            loopSpeak();
        }
        
        // 停止循环朗读
        function stopLooping() {
            isLooping = false;
            if (loopingSentence) {
                loopingSentence.classList.remove('looping');
                loopingSentence = null;
            }
            speechSynthesis.cancel();
        }
        
        // 朗读所有句子
        async function playAllSentences() {
            if (sentences.length === 0) {
                alert('请先输入文本并点击"Go"');
                return;
            }
            
            // 停止当前语音和循环
            stopLooping();
            speechSynthesis.cancel();
            
            // 重置索引
            currentSentenceIndex = 0;
            
            // 开始朗读
            playNextSentence();
        }
        
        // 朗读下一句
        function playNextSentence() {
            if (currentSentenceIndex >= sentences.length) {
                // 所有句子朗读完成
                document.querySelectorAll('.sentence-item').forEach(item => {
                    item.classList.remove('highlighted');
                });
                return;
            }
            
            const sentence = sentences[currentSentenceIndex];
            const sentenceElement = document.querySelector(`.sentence-item[data-index="${currentSentenceIndex + 1}"]`);
            
            if (sentenceElement) {
                // 高亮当前句子
                document.querySelectorAll('.sentence-item').forEach(item => {
                    item.classList.remove('highlighted');
                });
                sentenceElement.classList.add('highlighted');
                
                // 滚动到可视区域
                sentenceElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            // 创建语音
            const utterance = new SpeechSynthesisUtterance(sentence);
            if (selectedVoice) utterance.voice = selectedVoice;
            
            // 语音结束后朗读下一句
            utterance.onend = () => {
                // 移除高亮
                if (sentenceElement) {
                    setTimeout(() => {
                        sentenceElement.classList.remove('highlighted');
                    }, 300);
                }
                
                // 增加索引并朗读下一句
                currentSentenceIndex++;
                setTimeout(playNextSentence, 500);
            };
            
            // 开始朗读
            speechSynthesis.speak(utterance);
        }
        
        // 切换屏幕常亮
        async function toggleWakeLock() {
            if (!('wakeLock' in navigator)) {
                console.log('您的浏览器不支持屏幕常亮功能');
                return;
            }
            
            if (wakeLock) {
                // 释放唤醒锁
                await wakeLock.release();
                wakeLock = null;
            } else {
                try {
                    // 请求唤醒锁
                    wakeLock = await navigator.wakeLock.request('screen');
                    
                    // 处理唤醒锁释放
                    wakeLock.addEventListener('release', () => {
                        console.log('屏幕常亮已释放');
                    });
                } catch (err) {
                    console.error(`唤醒锁请求失败: ${err.message}`);
                }
            }
        }
        
        // 更新统计信息
        function updateStats(wordCount) {
            document.getElementById('stats').textContent = `${wordCount} 单词`;
        }
        
        // 统计单词数
        function countWords(text) {
            if (!text.trim()) return 0;
            return text.split(/\s+/).filter(word => word.length > 0).length;
        }
        
        // 修改点1：更新单词点击事件监听器（事件委托），适配新的HTML结构
        document.addEventListener('click', (e) => {
            // 检查点击的是单词、音标或无音标块
            const wordElement = e.target.closest('.word, .ipa, .no-ipa-block');
            if (wordElement) {
                const word = wordElement.dataset.word;
                if (!word) return;
                
                // 移除其他高亮
                document.querySelectorAll('.word, .ipa, .no-ipa-block').forEach(el => {
                    el.classList.remove('highlighted');
                });
                
                // 高亮当前元素
                wordElement.classList.add('highlighted');
                
                // 如果点击的是单词，也高亮对应的音标（如果在同一区块）
                if (wordElement.classList.contains('word')) {
                    const wordBlock = wordElement.parentElement;
                    const ipaElement = wordBlock.querySelector('.ipa');
                    if (ipaElement) {
                        ipaElement.classList.add('highlighted');
                    }
                }
                // 如果点击的是音标，也高亮对应的单词
                else if (wordElement.classList.contains('ipa')) {
                    const wordBlock = wordElement.parentElement;
                    const wordEl = wordBlock.querySelector('.word');
                    if (wordEl) {
                        wordEl.classList.add('highlighted');
                    }
                }
                
                // 添加高亮动画
                wordElement.classList.add('highlighted-word');
                setTimeout(() => {
                    wordElement.classList.remove('highlighted-word');
                }, 500);
                
                // 朗读单词
                if (speechSynthesis && word) {
                    speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(word);
                    if (selectedVoice) utterance.voice = selectedVoice;
                    speechSynthesis.speak(utterance);
                }
                return;
            }
        });
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
