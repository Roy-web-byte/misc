<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>English Reader</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #f7f8fa;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.title {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  color: #2c3e50;
  margin: 30px 0 20px;
  cursor: pointer;
  user-select: none;
}

#voiceSelect {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #fff;
  outline: none;
}

#inputArea {
  width: 100%;
  height: 180px;
  padding: 15px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 12px;
  resize: vertical;
  outline: none;
  background: white;
  word-break: break-all;
  white-space: pre-wrap;
}

#goBtn {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: 600;
  background: #007aff;
  color: white;
  border: none;
  border-radius: 12px;
  margin: 12px 0 25px;
  cursor: pointer;
}

#result {
  font-size: 18px;
}

.sentence {
  display: flex;
  align-items: flex-start;
  padding: 14px 12px 8px;
  border-radius: 10px;
  margin-bottom: 12px;
  background: #fff;
  border: 1px solid #eee;
  transition: background 0.2s, border-color 0.2s;
  cursor: pointer;
  max-width: 100%;
  overflow-wrap: break-word;
}

.sentence.active {
  background: #e1f5fe;
  border-color: #007aff;
}

.speaker {
  margin-right: 12px;
  font-size: 24px;
  user-select: none;
  flex-shrink: 0;
  padding-top: 6px;
}

.words-container {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  width: 100%;
  gap: 0;
  word-break: break-all;
  white-space: normal;
}

.word-wrapper {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  margin: 0 4px 10px 0;
  max-width: 100%;
}

.word {
  display: inline-block;
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 18px;
  line-height: 1.4;
  white-space: normal;
  word-break: break-all;
  transition: background 0.15s;
}

.word.active {
  background: #ffeb3b;
  font-weight: 500;
}

.phonetic {
  font-size: 11px;
  color: #a8b2be;
  line-height: 1.2;
  text-align: center;
  font-family: "Segoe UI", "Noto Sans", "DejaVu Sans", Arial, sans-serif;
  letter-spacing: 0.2px;
  white-space: normal;
  word-break: break-all;
  margin-top: 2px;
  user-select: none;
  max-width: 100%;
}
</style>
</head>

<body>
  <div class="title">English Reader</div>
  <select id="voiceSelect"></select>
  <textarea id="inputArea" placeholder="Paste your English text here..."></textarea>
  <button id="goBtn">Go</button>

// ==================== Rule-based IPA fallback ====================
function ruleBasedIPA(word) {
  if (!word) return '';
  let w = word.toLowerCase();
  let result = '';
  let i = 0;
  while (i < w.length) {
    const s = w.slice(i);
    if (s.startsWith('tion'))  { result += 'ʃən';  i += 4; continue; }
    if (s.startsWith('sion'))  { result += 'ʒən';  i += 4; continue; }
    if (s.startsWith('ture'))  { result += 'tʃər'; i += 4; continue; }
    if (s.startsWith('ight'))  { result += 'aɪt';  i += 4; continue; }
    if (s.startsWith('tch'))   { result += 'tʃ';   i += 3; continue; }
    if (s.startsWith('igh'))   { result += 'aɪ';   i += 3; continue; }
    if (s.startsWith('dge'))   { result += 'dʒ';   i += 3; continue; }
    if (s.startsWith('ck'))    { result += 'k';    i += 2; continue; }
    if (s.startsWith('kn'))    { result += 'n';    i += 2; continue; }
    if (s.startsWith('wr'))    { result += 'r';    i += 2; continue; }
    if (s.startsWith('gn'))    { result += 'n';    i += 2; continue; }
    if (s.startsWith('ph'))    { result += 'f';    i += 2; continue; }
    if (s.startsWith('wh'))    { result += 'w';    i += 2; continue; }
    if (s.startsWith('th'))    { result += 'ð';    i += 2; continue; }
    if (s.startsWith('sh'))    { result += 'ʃ';    i += 2; continue; }
    if (s.startsWith('ch'))    { result += 'tʃ';   i += 2; continue; }
    if (s.startsWith('ng'))    { result += 'ŋ';    i += 2; continue; }
    if (s.startsWith('nk'))    { result += 'ŋk';   i += 2; continue; }
    if (s.startsWith('ee'))    { result += 'iː';   i += 2; continue; }
    if (s.startsWith('ea'))    { result += 'iː';   i += 2; continue; }
    if (s.startsWith('ai'))    { result += 'eɪ';   i += 2; continue; }
    if (s.startsWith('ay'))    { result += 'eɪ';   i += 2; continue; }
    if (s.startsWith('oa'))    { result += 'oʊ';   i += 2; continue; }
    if (s.startsWith('oo'))    { result += 'uː';   i += 2; continue; }
    if (s.startsWith('ou'))    { result += 'aʊ';   i += 2; continue; }
    if (s.startsWith('ow'))    { result += 'oʊ';   i += 2; continue; }
    if (s.startsWith('oi'))    { result += 'ɔɪ';   i += 2; continue; }
    if (s.startsWith('oy'))    { result += 'ɔɪ';   i += 2; continue; }
    if (s.startsWith('au'))    { result += 'ɔː';   i += 2; continue; }
    if (s.startsWith('aw'))    { result += 'ɔː';   i += 2; continue; }
    if (s.startsWith('ew'))    { result += 'juː';  i += 2; continue; }
    if (s.startsWith('mb') && i === w.length - 2) { result += 'm'; i += 2; continue; }
    const c = w[i];
    const m = {
      'a':'æ','b':'b','c':'k','d':'d','e':'ɛ','f':'f','g':'ɡ','h':'h',
      'i':'ɪ','j':'dʒ','k':'k','l':'l','m':'m','n':'n','o':'ɒ','p':'p',
      'q':'k','r':'r','s':'s','t':'t','u':'ʌ','v':'v','w':'w',
      'x':'ks','y':'ɪ','z':'z'
    };
    result += (m[c] || c);
    i++;
  }
  return result;
}

function getIPA(token) {
  const clean = token.toLowerCase().replace(/^[^a-z']+|[^a-z']+$/g, '');
  if (!clean) return '';
  if (ipaDict[clean]) return ipaDict[clean];
  const noApost = clean.replace(/'/g, '');
  if (noApost && ipaDict[noApost]) return ipaDict[noApost];
  return ruleBasedIPA(noApost || clean);
}

// ==================== App Setup ====================
const inputArea = document.getElementById('inputArea');
const goBtn     = document.getElementById('goBtn');
const result    = document.getElementById('result');
const voiceSelect = document.getElementById('voiceSelect');
const titleEl   = document.querySelector('.title');

let allVoices = [];
let currentUtterance = null;

let wakeLock = null;
async function requestWakeLock() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (wakeLock && document.visibilityState === 'visible') requestWakeLock();
});
window.addEventListener('load', requestWakeLock);

function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  voiceSelect.innerHTML = '';
  allVoices.forEach((voice, i) => {
    if (voice.lang.includes('en')) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = `${voice.name} (${voice.lang})`;
      voiceSelect.appendChild(option);
    }
  });
  const samanthaIndex = allVoices.findIndex(v =>
    v.name.includes('Samantha') && v.lang.includes('en-US')
  );
  if (samanthaIndex !== -1) voiceSelect.value = samanthaIndex;
}
function getSelectedVoice() {
  return allVoices[voiceSelect.value] || allVoices.find(v => v.lang.includes('en-US'));
}
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function splitIntoRealSentences(text) {
  const s = text.replace(/\s+/g, ' ').trim();
  let t = s.replace(/(\d):(\d)/g, '$1⏱$2');
  const protectPatterns = [
    /\b([A-Z])\.([A-Z])\.([A-Z])\./gi,
    /\b([A-Z])\.([A-Z])\./gi,
    /\b[a-z]\.[a-z]\./gi,
    /\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\./gi
  ];
  protectPatterns.forEach(re => {
    t = t.replace(re, m => m.replace(/\./g, '•'));
  });
  const parts = t.split(/(?<=[.!?])\s+/);
  return parts.map(p =>
    p.replace(/⏱/g, ':').replace(/•/g, '.').trim()
  ).filter(Boolean);
}

goBtn.addEventListener('click', () => {
  const text = inputArea.value.trim();
  if (!text) return;
  const sentences = splitIntoRealSentences(text);
  renderResult(sentences);
});

titleEl.addEventListener('click', () => {
  const sentenceDivs = Array.from(document.querySelectorAll('.sentence'));
  if (sentenceDivs.length === 0) return;

  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));

  let idx = 0;
  function readNext() {
    if (idx >= sentenceDivs.length) {
      document.querySelectorAll('.sentence').forEach(el => el.classList.remove('active'));
      return;
    }
    const sentEl = sentenceDivs[idx];
    const words  = Array.from(sentEl.querySelectorAll('.word')).map(w => w.textContent);
    const text   = words.join(' ');

    document.querySelectorAll('.sentence').forEach(el => el.classList.remove('active'));
    sentEl.classList.add('active');
    sentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const u = new SpeechSynthesisUtterance(text);
    u.voice = getSelectedVoice();
    u.rate  = 0.96;
    u.pitch = 1.0;
    u.onend = () => { idx++; readNext(); };
    u.onerror = () => { idx++; readNext(); };
    window.speechSynthesis.speak(u);
    currentUtterance = u;
  }
  readNext();
});

function renderResult(segments) {
  result.innerHTML = '';
  segments.forEach(seg => {
    const sentenceDiv = document.createElement('div');
    sentenceDiv.className = 'sentence';

    const speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = '🔊';

    const wordsDiv = document.createElement('div');
    wordsDiv.className = 'words-container';

    const tokens = seg.split(/\s+/).filter(Boolean);
    tokens.forEach(token => {
      const wrapper = document.createElement('span');
      wrapper.className = 'word-wrapper';

      const w = document.createElement('span');
      w.className = 'word';
      w.textContent = token;
      w.onclick = (e) => {
        e.stopPropagation();
        speakWord(token, w);
      };

      const ph = document.createElement('span');
      ph.className = 'phonetic';
      ph.textContent = getIPA(token);

      wrapper.appendChild(w);
      wrapper.appendChild(ph);
      wordsDiv.appendChild(wrapper);
    });

    sentenceDiv.appendChild(speaker);
    sentenceDiv.appendChild(wordsDiv);
    sentenceDiv.onclick = () => speakSentence(seg, sentenceDiv);
    result.appendChild(sentenceDiv);
  });
}

function speakSentence(text, sentenceEl) {
  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));
  const u = new SpeechSynthesisUtterance(text);
  u.voice = getSelectedVoice();
  u.rate  = 0.96;
  u.pitch = 1.0;
  sentenceEl.classList.add('active');
  u.onend = () => sentenceEl.classList.remove('active');
  window.speechSynthesis.speak(u);
  currentUtterance = u;
}

function speakWord(word, wordEl) {
  stopSpeaking();
  document.querySelectorAll('.sentence, .word').forEach(el => el.classList.remove('active'));
  wordEl.classList.add('active');
  const u = new SpeechSynthesisUtterance(word);
  u.voice = getSelectedVoice();
  u.rate  = 0.9;
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
}
