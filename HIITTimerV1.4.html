<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Round Coach - HIIT Timer</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px 0;
    box-sizing: border-box;
    gap: 25px; /* 稍微增加间距，适配更大的元素 */
  }

  h1 {
    margin: 0;
    font-size: 36px; /* 标题放大（原28px） */
    font-weight: 800; /* 加粗 */
    letter-spacing: 1.5px;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* 增加一点立体感 */
  }

  .display-area {
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .round-info, .status-label {
    font-size: 18px; 
    color: #636366; 
    height: 24px;
    letter-spacing: 1px;
  }

  .time {
    font-size: 200px; /* 保持之前放大的读秒 */
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin: 5px 0;
    color: #fff; 
    transition: color 0.3s ease;
  }

  /* 调整设置区域布局为横向并排 */
  .settings {
    background: #1c1c1e;
    padding: 20px 10px;
    border-radius: 16px;
    width: 90%;
    max-width: 340px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3); /* 增加阴影，提升质感 */
  }

  /* 调整为输入框在上，标签在下 */
  .input-group {
    display: flex;
    flex-direction: column; 
    align-items: center;
    gap: 8px;
  }

  .input-group label {
    font-size: 14px;
    color: #aeaeb2;
  }

  input {
    width: 85px;
    padding: 10px 5px;
    font-size: 18px;
    text-align: center;
    background: #2c2c2e;
    border: none;
    color: #aeaeb2; 
    border-radius: 10px;
    outline: none;
  }

  input::placeholder {
    color: #636366;
  }

  .button-group {
    display: flex;
    gap: 15px;
    width: 90%; /* 稍微加宽按钮区域（原85%） */
    max-width: 360px; /* 最大宽度相应调大（原320px） */
  }

  button {
    flex: 1;
    padding: 20px; /* 按钮内边距放大（原16px） */
    font-size: 22px; /* 按钮字体放大（原18px） */
    font-weight: 700; /* 字体加粗 */
    border: none;
    border-radius: 16px; /* 圆角相应变大，保持比例（原12px） */
    color: white;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2); /* 按钮增加阴影 */
  }

  button:active {
    transform: scale(0.96);
    opacity: 0.9;
    box-shadow: 0 2px 3px rgba(0,0,0,0.2);
  }

  .start { 
    background: linear-gradient(145deg, #ff453a, #d72f25); /* 增加渐变色，更美观 */
  } 
  .reset { 
    background: linear-gradient(145deg, #30d158, #28a745); /* 增加渐变色，更美观 */
  }
</style>
</head>

<body>

<h1>🏋️ HIIT Timer</h1>

<div class="display-area">
  <div class="round-info" id="round-info">准备就绪</div>
  <div class="time" id="time">00</div>
  <div class="status-label" id="status-label">READY</div>
</div>

<div class="settings">
  <div class="input-group">
    <input type="text" id="work" placeholder="30秒" inputmode="numeric" 
           onfocus="handleFocus(this)" onblur="handleBlur(this, '秒')">
    <label>训练时间</label>
  </div>
  <div class="input-group">
    <input type="text" id="rest" placeholder="60秒" inputmode="numeric" 
           onfocus="handleFocus(this)" onblur="handleBlur(this, '秒')">
    <label>休息时间</label>
  </div>
  <div class="input-group">
    <input type="text" id="rounds" placeholder="5组" inputmode="numeric" 
           onfocus="handleFocus(this)" onblur="handleBlur(this, '组')">
    <label>训练组数</label>
  </div>
</div>

<div class="button-group">
  <button class="start" onclick="start()">开始训练</button>
  <button class="reset" onclick="reset()">结束训练</button>
</div>

<script>
// 逻辑部分完全保留，未做删减
let state = "idle"
let currentRound = 1
let totalRounds = 0
let workTime = 0
let restTime = 0
let phase = "work" 
let endTime = 0
let rafId = null
let lastSecond = -1
let isFinished = false;
let tempMemory = ""; 

window.onload = () => {
  const w = localStorage.getItem('hiit_work');
  const r = localStorage.getItem('hiit_rest');
  const rnd = localStorage.getItem('hiit_rounds');
  if (w) document.getElementById('work').value = w + "秒";
  if (r) document.getElementById('rest').value = r + "秒";
  if (rnd) document.getElementById('rounds').value = rnd + "组";
};

let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTick() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

function playWhistle(callback) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(2500, audioCtx.currentTime + 0.1);
  osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.4);
  if(callback) setTimeout(callback, 500);
}

function playCheers(callback) {
  const duration = 1.5;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1200;
  filter.Q.value = 1;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start();
  if(callback) setTimeout(callback, duration * 1000 - 200);
}

function playVictory() {
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
    gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i * 0.15 + 0.05);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.15 + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.15);
    osc.stop(audioCtx.currentTime + i * 0.15 + 0.2);
  });
}

function handleFocus(el) {
  if (state === "running") reset();
  tempMemory = el.value; 
  el.value = ""; 
}

function handleBlur(el, unit) {
  let val = el.value.trim();
  if (val === "") {
    el.value = tempMemory; 
  } else if (!isNaN(val)) {
    el.value = val + unit; 
  }
}

function speak(text, callback) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  if (callback) utter.onend = callback;
  speechSynthesis.speak(utter);
}

let wakeLock = null;
async function keepAwake() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
  }
}

function format(t) { return t < 10 ? "0" + t : t; }

function loop() {
  if (state !== "running") return;
  const now = Date.now();
  let left = Math.max(0, Math.ceil((endTime - now) / 1000));
  document.getElementById("time").innerText = format(left);
  if (left !== lastSecond && left > 0) {
    playTick();
    lastSecond = left;
  }
  if (left <= 0) nextPhase();
  rafId = requestAnimationFrame(loop);
}

function nextPhase() {
  lastSecond = -1;
  const timeEl = document.getElementById("time");
  if (phase === "work") {
    if (currentRound >= totalRounds) {
      finish();
      return;
    }
    phase = "rest";
    document.body.style.background = "#1c1c1e";
    timeEl.style.color = "#34c759"; 
    speak("Rest");
    document.getElementById("round-info").innerText = "第 " + currentRound + " 组";
    document.getElementById("status-label").innerText = "休息中";
    endTime = Date.now() + restTime * 1000;
  } else {
    currentRound++;
    phase = "work";
    document.body.style.background = "#111";
    timeEl.style.color = "#ff3b30"; 
    speak("Round " + currentRound);
    document.getElementById("round-info").innerText = "第 " + currentRound + " 组";
    document.getElementById("status-label").innerText = "训练中";
    endTime = Date.now() + workTime * 1000;
  }
}

function start() {
  if (state === "running") return;
  initAudio();
  const wRaw = document.getElementById("work").value.replace(/秒|组/g, "");
  const rRaw = document.getElementById("rest").value.replace(/秒|组/g, "");
  const rndRaw = document.getElementById("rounds").value.replace(/秒|组/g, "");
  workTime = parseInt(wRaw) || 30;
  restTime = parseInt(rRaw) || 60;
  totalRounds = parseInt(rndRaw) || 5;
  if(wRaw) localStorage.setItem('hiit_work', wRaw);
  if(rRaw) localStorage.setItem('hiit_rest', rRaw);
  if(rndRaw) localStorage.setItem('hiit_rounds', rndRaw);
  currentRound = 1; phase = "work"; state = "running"; isFinished = false; lastSecond = -1;
  document.body.style.background = "#111";
  document.getElementById("time").style.color = "#ff3b30"; 
  speak("Round 1");
  document.getElementById("round-info").innerText = "第 1 组";
  document.getElementById("status-label").innerText = "训练中";
  endTime = Date.now() + workTime * 1000;
  keepAwake();
  loop();
}

function reset() {
  if (state === "idle" || isFinished) return;
  state = "idle";
  cancelAnimationFrame(rafId);
  document.body.style.background = "#111";
  const timeEl = document.getElementById("time");
  timeEl.innerText = "00";
  timeEl.style.color = "#fff"; 
  document.getElementById("status-label").innerText = "已结束";
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

function finish() {
  state = "idle";
  isFinished = true;
  cancelAnimationFrame(rafId);
  document.body.style.background = "#111";
  const timeEl = document.getElementById("time");
  timeEl.style.color = "#fff"; 
  document.getElementById("round-info").innerText = "第 " + totalRounds + " 组";
  document.getElementById("status-label").innerText = "完成 🎉";
  
  speak("Workout complete", () => {
    playWhistle(() => {
      playCheers(() => {
        playVictory();
      });
    });
  });
}
</script>

</body>
</html>
